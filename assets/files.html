<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/icon.png">
  <title>File Explorer</title>
  <style>
    :root {
      --paper: #090d12;
      --panel: #111821;
      --panel-2: #151f2a;
      --ink: #edf4f2;
      --soft: #182330;
      --line: #293645;
      --muted: #9aa8b6;
      --deep: #34d399;
      --deep-2: #5ee0aa;
      --mint: #123326;
      --sky: #17314a;
      --gold: #3d3218;
      --rose: #3b1d23;
      --red: #ff8585;
      --shadow: rgba(0, 0, 0, 0.45);
      --focus: rgba(94, 224, 170, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font: 14px/1.35 Arial, Helvetica, sans-serif;
      letter-spacing: 0;
    }

    body {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--ink);
      padding: 0 11px;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover:not(:disabled),
    button:focus-visible,
    input:focus-visible {
      border-color: var(--deep-2);
      box-shadow: 0 0 0 3px var(--focus);
      outline: none;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    button.primary {
      border-color: var(--deep-2);
      background: var(--deep);
      color: #06130e;
      font-weight: 700;
    }

    button.danger {
      border-color: #71333a;
      background: var(--rose);
      color: var(--red);
    }

    button.active {
      border-color: var(--deep-2);
      background: var(--mint);
      color: var(--deep);
      font-weight: 700;
    }

    .top {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .top-inner {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 10px 14px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .brand {
      width: 46px;
      height: 46px;
      display: block;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 0 0 1px var(--line), 0 6px 16px rgba(52, 211, 153, 0.16);
    }

    .title {
      min-width: 0;
    }

    .title strong {
      display: block;
      font-size: 18px;
    }

    .title span {
      color: var(--muted);
      font-size: 12px;
    }

    .status {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--soft);
      padding: 0 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #566575;
    }

    .status.ready .dot {
      background: var(--deep);
    }

    .shell {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 14px;
      display: grid;
      grid-template-columns: 372px minmax(0, 1fr) 300px;
      gap: 12px;
      min-height: 0;
    }

    .rail,
    .browser,
    .target,
    .job {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 22px var(--shadow);
      min-width: 0;
    }

    .rail {
      padding: 10px;
      align-self: start;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      max-height: calc(100vh - 108px);
      overflow: hidden;
    }

    .side-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0c1219;
    }

    .side-tabs button {
      min-height: 32px;
      justify-content: center;
      padding: 0 8px;
      background: transparent;
      color: var(--muted);
    }

    .side-tabs button.active {
      border-color: var(--deep-2);
      background: var(--mint);
      color: var(--deep);
      font-weight: 800;
    }

    .side-pane {
      min-height: 0;
      min-width: 0;
      display: none;
      overflow: auto;
    }

    .side-pane.active {
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .places-list button {
      width: 100%;
      justify-content: flex-start;
      text-align: left;
      background: var(--soft);
    }

    .places-list button.active {
      border-color: var(--deep-2);
      background: var(--mint);
      color: var(--deep);
      font-weight: 700;
    }

    .browser {
      min-height: 650px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      overflow: hidden;
    }

    .pathbar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: var(--soft);
    }

    .path {
      width: 100%;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0c1219;
      color: var(--ink);
      padding: 0 10px;
      font-family: Consolas, Menlo, monospace;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
    }

    .actions button {
      flex: 0 0 auto;
    }

    button.upload-action {
      min-width: 112px;
      display: inline-grid;
      grid-template-columns: 18px minmax(0, auto);
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-color: #24554c;
      background: #102a26;
      color: #b9f4dd;
      font-weight: 700;
    }

    button.upload-action.archive {
      border-color: #4d4774;
      background: #19182c;
      color: #dcd3ff;
    }

    button.upload-action:hover:not(:disabled),
    button.upload-action:focus-visible {
      background: #163a33;
      color: #ecfff7;
    }

    button.upload-action.archive:hover:not(:disabled),
    button.upload-action.archive:focus-visible {
      background: #22203d;
      color: #f3f0ff;
    }

    button.upload-action svg {
      width: 18px;
      height: 18px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .count {
      margin-left: auto;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .file-head,
    .file-row {
      display: grid;
      gap: 8px;
      align-items: center;
    }

    .file-head {
      position: sticky;
      top: 0;
      z-index: 1;
      grid-template-columns: 34px minmax(0, 1fr) 92px 112px 72px;
      min-height: 34px;
      padding: 0 12px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .list {
      min-height: 0;
      overflow: auto;
    }

    .file-row {
      position: relative;
      grid-template-columns: minmax(0, 1fr) 72px;
      min-height: 42px;
      padding: 0 12px;
      border-bottom: 1px solid #202a36;
      cursor: default;
      user-select: none;
    }

    .file-row:hover {
      background: #172231;
    }

    .file-row:focus-within {
      position: relative;
      z-index: 2;
      background: #172231;
      box-shadow: inset 0 0 0 2px var(--deep-2), 0 0 0 3px var(--focus);
      outline: none;
    }

    .file-row.selected {
      background: var(--sky);
    }

    .file-row.selected:focus-within {
      background: #173d54;
    }

    .file-row.parent {
      color: var(--muted);
    }

    .row-main {
      min-width: 0;
      min-height: 42px;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) 92px 112px;
      gap: 8px;
      align-items: center;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
    }

    .row-main:hover,
    .row-main:focus-visible {
      background: transparent;
      color: inherit;
      box-shadow: none;
      outline: none;
    }

    .icon-cell {
      width: 26px;
      height: 26px;
      display: inline-grid;
      place-items: center;
      color: var(--muted);
    }

    .icon-cell svg,
    .row-more svg,
    .backup-indicator svg,
    .row-menu svg,
    .new-folder-inline svg {
      width: 18px;
      height: 18px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .file-row.dir .icon-cell {
      color: var(--deep);
    }

    .file-row.new-folder-inline .icon-cell {
      color: var(--deep-2);
    }

    .row-actions {
      position: relative;
      display: flex;
      justify-content: flex-end;
      gap: 4px;
    }

    .toolbar-actions {
      flex: 0 0 auto;
    }

    .row-more,
    .backup-indicator {
      width: 30px;
      height: 30px;
      min-height: 30px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
    }

    .row-more:hover,
    .row-more:focus-visible,
    .backup-indicator:hover,
    .backup-indicator:focus-visible {
      color: var(--ink);
      background: var(--soft);
    }

    .backup-indicator {
      color: #85f2bf;
      border-color: rgba(133, 242, 191, .28);
      background: rgba(47, 184, 125, .1);
    }

    .row-menu {
      position: absolute;
      right: 0;
      top: 34px;
      z-index: 5;
      width: 150px;
      display: none;
      gap: 4px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      box-shadow: 0 12px 26px var(--shadow);
    }

    .row-menu.open {
      display: grid;
    }

    .row-menu button {
      min-height: 32px;
      display: grid;
      grid-template-columns: 20px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      text-align: left;
      background: transparent;
      border-color: transparent;
    }

    .row-menu button:hover,
    .row-menu button:focus-visible {
      border-color: var(--deep-2);
      background: var(--soft);
    }

    .row-menu button.danger {
      color: var(--red);
    }

    .backup-list {
      display: grid;
      gap: 8px;
    }

    .backup-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0c1219;
    }

    .backup-item strong,
    .backup-item span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .backup-item span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar-menu {
      position: fixed;
      right: auto;
      top: 36px;
      z-index: 20;
    }

    .name,
    .muted-cell {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .muted-cell {
      color: var(--muted);
      font-size: 12px;
    }

    .target {
      align-self: start;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .target h2 {
      margin: 0;
      font-size: 15px;
    }

    .target-path {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0c1219;
      color: var(--ink);
      padding: 0 10px;
      font-family: Consolas, Menlo, monospace;
    }

    .target-buttons,
    .target-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .target-grid button {
      background: var(--soft);
    }

    .detail {
      min-height: 146px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0c1219;
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
    }

    .detail strong {
      display: block;
      color: var(--ink);
      font-size: 13px;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .detail-grid {
      display: grid;
      gap: 6px;
    }

    .detail-row {
      min-width: 0;
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 8px;
      align-items: baseline;
    }

    .detail-row span:first-child {
      color: var(--muted);
    }

    .detail-row span:last-child {
      min-width: 0;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .detail-note {
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid #25313e;
      color: var(--muted);
    }

    .log-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 2px 0 0;
    }

    .log-toolbar .spacer {
      flex: 1 1 auto;
    }

    .log-toolbar button {
      min-height: 30px;
      padding: 0 8px;
      font-size: 12px;
    }

    .log-list {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .log-entry {
      min-height: 58px;
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
      width: 100%;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      color: var(--ink);
      font: inherit;
      text-align: left;
    }

    .log-entry:hover,
    .log-entry:focus-visible {
      border-color: #39506a;
      background: #172231;
      color: var(--ink);
    }

    .log-entry.selected {
      border-color: var(--deep-2);
      background: #102839;
    }

    .log-entry.owned {
      border-color: #d99b32;
      box-shadow: inset 4px 0 0 #d99b32, 0 0 0 1px rgba(217, 155, 50, .24);
      background: #1c1d19;
    }

    .log-entry.owned.queued {
      border-color: #5faadc;
      box-shadow: inset 4px 0 0 #8fd3ff, 0 0 0 1px rgba(143, 211, 255, .26);
      background: #101f2c;
    }

    .log-entry.owned.running {
      border-color: #d99b32;
      box-shadow: inset 4px 0 0 #ffd36a, 0 0 0 1px rgba(255, 211, 106, .26);
      background: #211b12;
      animation: owned-running-pulse 2.4s ease-in-out infinite;
    }

    .log-entry.owned.selected {
      border-color: var(--deep-2);
    }

    @keyframes owned-running-pulse {
      0%,
      100% {
        border-color: #d99b32;
        box-shadow: inset 4px 0 0 #ffd36a, 0 0 0 1px rgba(255, 211, 106, .22);
        background: #211b12;
      }

      50% {
        border-color: #e9b54d;
        box-shadow: inset 4px 0 0 #ffe19a, 0 0 0 2px rgba(255, 211, 106, .36);
        background: #261f15;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .log-entry.owned.running {
        animation: none;
      }
    }

    .log-status-icon {
      width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      background: #101922;
    }

    .log-status-icon svg {
      width: 18px;
      height: 18px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .log-entry.success .log-status-icon {
      color: #85f2bf;
      background: rgba(47, 184, 125, .14);
    }

    .log-entry.failed .log-status-icon {
      color: #ff9aa8;
      background: rgba(255, 105, 124, .14);
    }

    .log-entry.running .log-status-icon {
      color: #ffd36a;
      background: rgba(255, 211, 106, .14);
    }

    .log-entry.queued .log-status-icon {
      color: #8fd3ff;
      background: rgba(80, 160, 220, .14);
    }

    .log-entry.cancelled .log-status-icon,
    .log-entry.abandoned .log-status-icon {
      color: #c3c9d1;
      background: rgba(180, 190, 205, .12);
    }

    .log-result {
      font-weight: 800;
      text-transform: uppercase;
      font-size: 11px;
    }

    .log-entry.success .log-result {
      color: #85f2bf;
    }

    .log-entry.failed .log-result {
      color: #ff9aa8;
    }

    .log-entry.running .log-result {
      color: #ffd36a;
    }

    .log-entry.queued .log-result {
      color: #8fd3ff;
    }

    .log-entry.cancelled .log-result,
    .log-entry.abandoned .log-result {
      color: #c3c9d1;
    }

    .log-main {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .log-main strong,
    .log-main span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-main span,
    .log-time {
      color: var(--muted);
      font-size: 12px;
    }

    .log-time {
      white-space: nowrap;
    }

    .activity-warning {
      color: #ffd36a;
    }

    .activity-meter {
      height: 5px;
      border-radius: 999px;
      overflow: hidden;
      background: #101922;
    }

    .activity-meter span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--deep), #85f2bf);
    }

    .log-content {
      margin: 8px 0 0;
      max-height: 360px;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border-top: 1px solid #25313e;
      padding-top: 8px;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #d9e8f4;
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #25313e;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(5, 8, 12, .72);
    }

    .modal-card {
      width: min(720px, 100%);
      max-height: min(760px, calc(100vh - 36px));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 22px 70px rgba(0, 0, 0, .45);
      overflow: hidden;
    }

    .modal-head {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
    }

    .modal-head strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .modal-head .spacer {
      flex: 1 1 auto;
    }

    .modal-body {
      min-width: 0;
      overflow: auto;
      padding: 12px;
    }

    .job {
      position: fixed;
      left: 50%;
      bottom: 14px;
      z-index: 10;
      width: min(840px, calc(100% - 28px));
      transform: translateX(-50%);
      display: none;
      grid-template-columns: 110px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
    }

    .job.show {
      display: grid;
    }

    .job.owner {
      border-color: #d99b32;
      background: #211b12;
    }

    .job.watcher {
      border-color: #326a96;
      background: #121d25;
    }

    .meter {
      height: 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: var(--soft);
    }

    .meter-fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--deep), #85f2bf);
    }

    .job.owner .meter-fill {
      background: linear-gradient(90deg, #d99b32, #ffd37a);
    }

    .job.watcher .meter-fill {
      background: linear-gradient(90deg, #326a96, #8fd3ff);
    }

    .job-note {
      grid-column: 1 / -1;
      display: none;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.35;
    }

    .job-note.show {
      display: block;
    }

    .job.owner .job-note {
      background: #33240f;
      color: #ffd37a;
    }

    .job.watcher .job-note {
      background: #142b3c;
      color: #9edaff;
    }

    .job-text {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
      white-space: normal;
    }

    .toast {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 12;
      max-width: min(460px, calc(100% - 28px));
      display: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 12px 28px var(--shadow);
      padding: 10px 12px;
    }

    .toast.show {
      display: block;
    }

    .toast.err {
      border-color: #71333a;
      background: var(--rose);
    }

    .toast.ok {
      border-color: #27724e;
      background: var(--mint);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 1080px) {
      .shell {
        grid-template-columns: 330px minmax(0, 1fr);
      }

      .target {
        grid-column: 1 / -1;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        align-items: start;
      }

      .target h2,
      .detail {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 700px) {
      .top-inner {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .status {
        grid-column: 1 / -1;
      }

      .shell {
        grid-template-columns: 1fr;
        padding: 10px;
      }

      .rail {
        max-height: none;
      }

      .side-pane.active {
        max-height: 220px;
      }

      .pathbar {
        grid-template-columns: auto minmax(0, 1fr) auto;
      }

      .pathbar #refresh {
        grid-column: 1 / -1;
      }

      .actions {
        flex-wrap: nowrap;
      }

      .file-head,
      .file-row {
        grid-template-columns: 30px minmax(0, 1fr) 72px 34px;
      }

      .file-row {
        grid-template-columns: minmax(0, 1fr) 34px;
      }

      .row-main {
        grid-template-columns: 30px minmax(0, 1fr) 72px;
      }

      .log-entry {
        grid-template-columns: 32px minmax(0, 1fr);
      }

      .log-time {
        white-space: normal;
      }

      .file-head span:last-child,
      .file-head span:nth-child(4),
      .file-row .mtime {
        display: none;
      }

      .browser {
        min-height: 540px;
      }

      .target {
        grid-template-columns: 1fr;
      }

      .job {
        grid-template-columns: 1fr auto;
      }

      .job .meter,
      .job-text {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <img class="brand" src="/icon.png" alt="">
      <div class="title">
        <strong>File Explorer</strong>
        <span id="build">File Manager</span>
      </div>
      <div class="status" id="status"><span class="dot"></span><span>Connecting</span></div>
    </div>
  </header>

  <main class="shell">
    <aside class="rail" aria-label="Side panel">
      <div class="side-tabs" role="tablist" aria-label="Side panel content">
        <button id="side-common-tab" class="active" type="button" data-side-mode="paths">Common Paths</button>
        <button id="side-logs-tab" type="button" data-side-mode="activity">Activity</button>
      </div>
      <nav class="side-pane places-list active" id="places" aria-label="Common paths"></nav>
      <section class="side-pane" id="side-logs" aria-label="Activity"></section>
    </aside>

    <section class="browser" aria-label="Files">
      <div class="pathbar">
        <button id="up">Up</button>
        <input id="path" class="path" spellcheck="false" value="/data">
        <button id="go" class="primary">Go</button>
        <button id="refresh">Refresh</button>
      </div>

      <div class="actions">
        <button id="multi-select" aria-pressed="false">Multi Select</button>
        <button id="upload-files" class="upload-action" data-icon="upload-file">Upload Files</button>
        <button id="upload-folder" class="upload-action" data-icon="upload-folder">Upload Folder</button>
        <button id="upload-zip" class="upload-action archive" data-icon="upload-zip">Upload Zip</button>
        <button id="upload-rar" class="upload-action archive" data-icon="upload-rar">Upload RAR</button>
        <span id="selection" class="count">0 selected</span>
        <span id="bulk-actions" class="row-actions toolbar-actions"></span>
      </div>

      <div class="list" id="list">
        <div class="file-head">
          <span></span>
          <span>Name</span>
          <span>Type</span>
          <span>Modified</span>
          <span></span>
        </div>
      </div>
    </section>

    <aside class="target" aria-label="Transfer target">
      <h2>Target</h2>
      <input id="target-path" class="target-path" spellcheck="false" value="/mnt/usb0">
      <div class="target-buttons">
        <button id="copy" class="primary">Copy Here</button>
        <button id="move">Move Here</button>
      </div>
      <div class="target-grid">
        <button data-target="/data/homebrew">/data/homebrew</button>
        <button data-target="/mnt/usb0">/mnt/usb0</button>
        <button id="target-current">Current</button>
        <button id="open-target">Open</button>
      </div>
      <div class="detail" id="detail">
        <strong>No selection</strong>
        <span>Ready</span>
      </div>
    </aside>
  </main>

  <section id="job" class="job" aria-live="polite">
    <strong id="job-verb">Working</strong>
    <div class="meter"><div id="job-fill" class="meter-fill"></div></div>
    <button id="job-cancel">Cancel</button>
    <span id="job-note" class="job-note"></span>
    <span id="job-text" class="job-text"></span>
  </section>

  <div id="log-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="log-modal-title">
    <section class="modal-card">
      <div class="modal-head">
        <strong id="log-modal-title">Operation Log</strong>
        <span class="spacer"></span>
        <button id="log-modal-close" type="button">Close</button>
      </div>
      <div id="log-modal-body" class="modal-body"></div>
    </section>
  </div>

  <input id="file-picker" class="hidden" type="file" multiple>
  <input id="folder-picker" class="hidden" type="file" multiple webkitdirectory directory>
  <input id="zip-picker" class="hidden" type="file" accept=".zip,application/zip,application/x-zip-compressed">
  <input id="rar-picker" class="hidden" type="file" multiple>
  <div id="toast" class="toast"></div>

  <script>
    const places = [
      ['Root', '/'],
      ['Data', '/data'],
      ['Mounts', '/mnt'],
      ['User', '/user'],
      ['System', '/system_data']
    ];
    const UPLOAD_CONCURRENCY = 4;
    const UPLOAD_CHUNK_CONCURRENCY = 4;
    const UPLOAD_CHUNK_SIZE = 8 * 1024 * 1024;
    const UPLOAD_CHUNK_THRESHOLD = 32 * 1024 * 1024;
    const UPLOAD_PROGRESS_INTERVAL = 150;
    const ZIP_EOCD_MAX = 22 + 65535;
    const ZIP_CENTRAL_DIR_MAX = 64 * 1024 * 1024;
    const ZIP_FLAG_ENCRYPTED = 0x0001;
    const ZIP_FLAG_DATA_DESCRIPTOR = 0x0008;
    const ZIP_FLAG_UTF8 = 0x0800;
    const ZIP_METHOD_STORE = 0;
    const ZIP_METHOD_DEFLATE = 8;
    const RAR_UPLOAD_MAGIC = 'BFPRAR01';
    const RAR_VOLUME_MAX = 128;
    const LAST_PATH_COOKIE = 'file_explorer_last_path';
    const ACTIVITY_CLIENT_KEY = 'file_explorer_activity_client_id';
    const ACTIVITY_POLL_MS = 1200;

    const state = {
      path: '/data',
      entries: [],
      selected: new Set(),
      detailToken: 0,
      controllerMulti: false,
      squareToggleHeld: false,
      multiSelectLock: false,
      uploadBusy: false,
      uploadAbort: false,
      uploadJobCancel: false,
      uploadJobVerb: '',
      uploadXhrs: new Set(),
      jobTimer: 0,
      sideMode: 'paths',
      logs: [],
      selectedLog: '',
      logRefreshTimer: 0,
      activityPollTimer: 0,
      clientId: '',
      localQueue: new Map(),
      localIdSeq: 1,
      activeQueueId: '',
      activeLeaseToken: '',
      activeActivityProgressAt: 0,
      lastBackgroundWarningAt: 0
    };

    function el(id) {
      return document.getElementById(id);
    }

    function cleanPath(path) {
      if (!path || path[0] !== '/') return '/';
      return path.replace(/\/+/g, '/').replace(/\/$/, '') || '/';
    }

    function cookieValue(name) {
      const prefix = name + '=';
      const parts = document.cookie ? document.cookie.split(';') : [];
      for (const part of parts) {
        const item = part.trim();
        if (item.indexOf(prefix) === 0) {
          return decodeURIComponent(item.slice(prefix.length));
        }
      }
      return '';
    }

    function saveLastPath(path) {
      document.cookie = LAST_PATH_COOKIE + '=' + encodeURIComponent(cleanPath(path)) +
        '; max-age=15552000; path=/';
    }

    function loadLastPath() {
      return cleanPath(cookieValue(LAST_PATH_COOKIE) || '/data');
    }

    function parentPath(path) {
      path = cleanPath(path);
      if (path === '/') return '/';
      const i = path.lastIndexOf('/');
      return i <= 0 ? '/' : path.slice(0, i);
    }

    function joinPath(dir, name) {
      dir = cleanPath(dir);
      return dir === '/' ? '/' + name : dir + '/' + name;
    }

    function fileUrl(path) {
      return '/fs' + cleanPath(path).split('/').map(encodeURIComponent).join('/');
    }

    function localArchiveKind(name) {
      const lower = String(name || '').toLowerCase();
      if (lower.endsWith('.zip')) return 'zip';
      if (lower.endsWith('.part001.rar')) return 'rar';
      if (lower.endsWith('.rar') && !/\.part\d+\.rar$/.test(lower)) return 'rar';
      return '';
    }

    function backupCount(entry) {
      return Math.max(0, Number(entry && entry.backups || 0));
    }

    function api(url) {
      return fetch(url, { cache: 'no-store' }).then(async (response) => {
        const body = await response.json().catch(() => ({}));
        if (!response.ok || body.ok === false) {
          throw new Error(body.error || ('HTTP ' + response.status));
        }
        return body;
      });
    }

    function isCancelledError(message) {
      return /^(upload cancelled|cancelled)$/i.test(String(message || '').trim());
    }

    function activityClientId() {
      if (state.clientId) return state.clientId;
      let value = '';
      try {
        value = sessionStorage.getItem(ACTIVITY_CLIENT_KEY) || '';
      } catch (err) {}
      if (!/^[A-Za-z0-9._:-]{1,95}$/.test(value)) {
        const random = window.crypto && crypto.randomUUID ?
          crypto.randomUUID().replace(/[^A-Za-z0-9]/g, '') :
          String(Date.now()) + String(Math.random()).slice(2);
        value = 'tab-' + random.slice(0, 48);
        try {
          sessionStorage.setItem(ACTIVITY_CLIENT_KEY, value);
        } catch (err) {}
      }
      state.clientId = value;
      return value;
    }

    function nextLocalId(kind) {
      return String(kind || 'item') + '-' + Date.now().toString(36) + '-' +
        (state.localIdSeq++).toString(36);
    }

    function activityOwnedIds() {
      return Array.from(state.localQueue.keys()).filter(Boolean).join(',');
    }

    function activityLeaseExtra(queue) {
      if (!queue || !queue.queueId || !queue.leaseToken) return '';
      return '&queueId=' + encodeURIComponent(queue.queueId) +
        '&leaseToken=' + encodeURIComponent(queue.leaseToken);
    }

    function toast(message, kind) {
      const box = el('toast');
      box.textContent = message;
      box.className = 'toast show ' + (kind || '');
      clearTimeout(box._timer);
      box._timer = setTimeout(() => {
        box.className = 'toast';
      }, 3200);
      if ((kind === 'ok' || kind === 'err') &&
          !/^(activity|clear activity|logs|clear logs):/i.test(message || '')) {
        scheduleLogsReveal();
      }
    }

    function sortEntries(entries) {
      return entries.slice().sort((a, b) => {
        if (a.dir !== b.dir) return a.dir ? -1 : 1;
        return a.name.localeCompare(b.name);
      });
    }

    function shortSize(size) {
      if (!Number.isFinite(size) || size < 0) return '';
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      let value = size;
      let unit = 0;
      while (value >= 1024 && unit < units.length - 1) {
        value /= 1024;
        unit++;
      }
      return (unit ? value.toFixed(value >= 10 ? 0 : 1) : value.toFixed(0)) + ' ' + units[unit];
    }

    function exactSize(size) {
      if (!Number.isFinite(size) || size < 0) return 'Unknown';
      return shortSize(size) + ' (' + Math.round(size).toLocaleString() + ' bytes)';
    }

    function shortDuration(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return 'unknown';
      seconds = Math.round(seconds);
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      if (h) return h + 'h ' + m + 'm';
      if (m) return m + 'm ' + s + 's';
      return s + 's';
    }

    function speedMBps(bytesPerSecond) {
      if (!Number.isFinite(bytesPerSecond) || bytesPerSecond <= 0) return '';
      const mb = bytesPerSecond / (1024 * 1024);
      return mb.toFixed(mb >= 10 ? 1 : 2) + ' MB/s';
    }

    function formatDate(seconds) {
      if (!Number.isFinite(seconds) || seconds <= 0) return 'Unknown';
      return new Date(seconds * 1000).toLocaleString();
    }

    function pollControllerState() {
      let multi = false;
      let squarePressed = false;
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      for (const pad of pads) {
        if (!pad || !pad.buttons) continue;
        const r2 = pad.buttons[7];
        if (r2 && (r2.pressed || r2.value > 0.45)) {
          multi = true;
        }
        const square = pad.buttons[2];
        if (square && (square.pressed || square.value > 0.45)) {
          squarePressed = true;
        }
      }
      if (squarePressed && !state.squareToggleHeld) {
        toggleMultiSelectLock();
      }
      state.squareToggleHeld = squarePressed;
      state.controllerMulti = multi;
      requestAnimationFrame(pollControllerState);
    }

    function jobProgressText(job) {
      const copied = Number(job.copiedBytes || 0);
      const total = Number(job.totalBytes || 0);
      const doneFiles = Number(job.doneFiles || 0);
      const totalFiles = Number(job.totalFiles || 0);
      const failedFiles = Number(job.failedFiles || 0);
      const elapsed = Math.max(0, (Date.now() / 1000) - Number(job.startedAt || 0));
      const reportedSpeed = Number(job.speedBytesPerSec || 0);
      const speed = reportedSpeed > 0 ? reportedSpeed :
        (elapsed > 0 && copied > 0 ? copied / elapsed : 0);
      const reportedEta = Number(job.etaSeconds || 0);
      const pct = total > 0 ? Math.max(0, Math.min(100, (copied / total) * 100)) : 0;
      const parts = [];

      if (total > 0) {
        parts.push(shortSize(copied) + ' / ' + shortSize(total));
        parts.push(pct.toFixed(1) + '%');
      } else if (job.busy) {
        parts.push(job.current || 'Preparing');
      }

      if (totalFiles > 0) {
        parts.push(doneFiles + ' / ' + totalFiles + ' items');
      }

      if (speed > 0) {
        parts.push(speedMBps(speed));
        if (reportedEta > 0) {
          parts.push('ETA ' + shortDuration(reportedEta));
        } else if (total > copied) {
          parts.push('ETA ' + shortDuration((total - copied) / speed));
        }
      }

      if (failedFiles > 0) parts.push(failedFiles + ' failed');
      if (job.cancelling) parts.push('cancelling');

      if (job.current && total > 0) parts.push(job.current);
      if (!parts.length) return job.error || 'Done';
      return parts.join(' | ');
    }

    function isOwnRarUpload() {
      return state.uploadBusy && state.uploadJobVerb === 'unrar';
    }

    function updateJobRole(job) {
      const box = el('job');
      const note = el('job-note');
      const jobBusy = !job || job.busy !== false;
      const isRarJob = ((job && job.busy && job.verb === 'unrar') ||
        (isOwnRarUpload() && jobBusy));

      box.classList.remove('owner', 'watcher');
      note.classList.remove('show');
      note.textContent = '';

      if (!isRarJob) return;

      if (isOwnRarUpload()) {
        box.classList.add('owner');
        note.textContent = 'Uploading RAR and extracting. Do not close this tab until the operation completes.';
      } else {
        box.classList.add('watcher');
        note.textContent = 'Watching RAR upload from another tab. Safe to close this tab; leave the uploading tab open.';
      }
      note.classList.add('show');
    }

    function setJobBox(verb, text, pct) {
      if (state.jobTimer) {
        clearInterval(state.jobTimer);
        state.jobTimer = 0;
      }
      el('job').classList.add('show');
      el('job-verb').textContent = verb || 'Working';
      el('job-text').textContent = text || '';
      el('job-fill').style.width = Math.max(0, Math.min(100, pct || 0)).toFixed(1) + '%';
      updateJobRole({ busy: true, verb: verb || '' });
    }

    function uploadProgressText(doneBytes, totalBytes, startedAt, doneFiles, count, name, failed, cancelling) {
      const elapsed = Math.max(0, (Date.now() - startedAt) / 1000);
      const speed = elapsed > 0 && doneBytes > 0 ? doneBytes / elapsed : 0;
      const pct = totalBytes > 0 ? Math.max(0, Math.min(100, (doneBytes / totalBytes) * 100)) : 0;
      const parts = [];

      if (totalBytes > 0) {
        parts.push(shortSize(doneBytes) + ' / ' + shortSize(totalBytes));
        parts.push(pct.toFixed(1) + '%');
      } else {
        parts.push('Preparing');
      }

      parts.push(Math.min(doneFiles, count) + ' / ' + count + ' files');
      if (speed > 0) {
        parts.push(speedMBps(speed));
        if (totalBytes > doneBytes) {
          parts.push('ETA ' + shortDuration((totalBytes - doneBytes) / speed));
        }
      }
      if (failed > 0) parts.push(failed + ' failed');
      if (cancelling) parts.push('cancelling');
      if (name) parts.push(name);

      return parts.join(' | ');
    }

    function updateUploadJob(doneBytes, totalBytes, startedAt, index, count, name, failed, cancelling) {
      const pct = totalBytes > 0 ? (doneBytes / totalBytes) * 100 : 0;
      setJobBox('upload', uploadProgressText(
        doneBytes, totalBytes, startedAt, index, count, name, failed, cancelling
      ), pct);
    }

    function detailRow(label, value) {
      const row = document.createElement('div');
      row.className = 'detail-row';

      const key = document.createElement('span');
      key.textContent = label;

      const val = document.createElement('span');
      val.textContent = value || 'Unknown';
      val.title = val.textContent;

      row.appendChild(key);
      row.appendChild(val);
      return row;
    }

    function renderDetail(title, rows, note) {
      const detail = el('detail');
      detail.textContent = '';

      const strong = document.createElement('strong');
      strong.textContent = title;
      strong.title = title;
      detail.appendChild(strong);

      const grid = document.createElement('div');
      grid.className = 'detail-grid';
      for (const row of rows) {
        grid.appendChild(detailRow(row[0], row[1]));
      }
      detail.appendChild(grid);

      if (note) {
        const info = document.createElement('div');
        info.className = 'detail-note';
        info.textContent = note;
        detail.appendChild(info);
      }
    }


    function setSideMode(mode) {
      state.sideMode = (mode === 'activity' || mode === 'logs') ? 'activity' : 'paths';
      document.querySelectorAll('[data-side-mode]').forEach((button) => {
        const active = button.dataset.sideMode === state.sideMode;
        button.classList.toggle('active', active);
        button.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      el('places').classList.toggle('active', state.sideMode === 'paths');
      el('side-logs').classList.toggle('active', state.sideMode === 'activity');
    }


    function scheduleLogsReveal() {
      if (!el('side-logs')) return;
      if (state.logRefreshTimer) clearTimeout(state.logRefreshTimer);
      state.logRefreshTimer = setTimeout(() => {
        state.logRefreshTimer = 0;
        refreshLogs({ activate: true, preserveSelection: true, quiet: true });
      }, 350);
    }


    function logStatusSvg(result) {
      if (result === 'success') {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6 9 17l-5-5"></path></svg>';
      }
      if (result === 'running') {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8"></circle><path d="M12 7v5l3 2"></path></svg>';
      }
      if (result === 'queued') {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h12"></path><path d="M8 12h12"></path><path d="M8 18h12"></path><path d="M4 6h.01"></path><path d="M4 12h.01"></path><path d="M4 18h.01"></path></svg>';
      }
      if (result === 'cancelled' || result === 'abandoned') {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8"></circle><path d="M8 12h8"></path></svg>';
      }
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8"></circle><path d="m15 9-6 6"></path><path d="m9 9 6 6"></path></svg>';
    }


    function logResultLabel(result) {
      if (result === 'queued') return 'Queued';
      if (result === 'success') return 'Finished';
      if (result === 'running') return 'Running';
      if (result === 'failed') return 'Failed';
      if (result === 'cancelled') return 'Cancelled';
      if (result === 'abandoned') return 'Abandoned';
      return result || 'Unknown';
    }


    function activityStatus(item) {
      return (item && (item.status || item.result)) || 'unknown';
    }


    function activityKindLabel(kind) {
      kind = String(kind || '').toLowerCase();
      if (kind === 'rar' || kind === 'unrar') return 'RAR';
      if (kind === 'zip' || kind === 'unzip') return 'ZIP';
      if (kind === 'upload') return 'Upload';
      if (kind === 'copy') return 'Copy';
      if (kind === 'move') return 'Move';
      if (kind === 'delete') return 'Delete';
      if (kind === 'chmod') return 'Permissions';
      if (kind === 'mkdir') return 'Folder';
      if (kind === 'rename') return 'Rename';
      return kind ? kind.charAt(0).toUpperCase() + kind.slice(1) : 'Activity';
    }


    function activityPercent(item) {
      const copied = Number((item && (item.copiedBytes || item.progress)) || 0);
      const total = Number((item && item.totalBytes) || 0);
      return total > 0 ? Math.max(0, Math.min(100, (copied / total) * 100)) : 0;
    }


    function activityMeta(item) {
      const status = activityStatus(item);
      const parts = [logResultLabel(status)];
      const copied = Number(item.copiedBytes || item.progress || 0);
      const total = Number(item.totalBytes || 0);
      const done = Number(item.doneItems || 0);
      const totalItems = Number(item.totalItems || 0);
      const failed = Number(item.failedItems || 0);
      if (status === 'queued' && Number(item.position || 0) > 0) {
        parts.push('position ' + Number(item.position));
      }
      if (total > 0) {
        parts.push(shortSize(copied) + ' / ' + shortSize(total));
        parts.push(activityPercent(item).toFixed(1) + '%');
      }
      if (totalItems > 0) {
        parts.push(Math.min(done, totalItems) + ' / ' + totalItems + ' items');
      }
      if (failed > 0) parts.push(failed + ' failed');
      const stamp = Number(item.updatedAt || item.mtime || item.createdAt || 0);
      if (stamp > 0) parts.push(formatDate(stamp));
      return parts.join(' | ');
    }


    function activityWarning(item) {
      if (!item || item.source === 'log') return '';
      const status = activityStatus(item);
      if (item.owned && status === 'queued') {
        return 'Keep this tab open or this queued item will be removed.';
      }
      if (item.owned && status === 'running') {
        const kind = String(item.kind || '').toLowerCase();
        if (kind === 'rar' || kind === 'zip') {
          return 'Uploading and extracting. Do not close this tab.';
        }
        return 'Uploading. Do not close this tab.';
      }
      if (!item.owned && status === 'running') {
        return 'Running from another tab. Safe to close this tab.';
      }
      if (!item.owned && status === 'queued') {
        return 'Queued by another tab.';
      }
      return '';
    }


    function activityCreatedAt(item) {
      return Number((item && (item.createdAt || item.mtime || item.updatedAt)) || 0);
    }


    function sortActivityItems(items) {
      return Array.from(items || []).sort((a, b) => {
        const at = activityCreatedAt(a);
        const bt = activityCreatedAt(b);
        if (at !== bt) return bt - at;
        return String(b.queueId || b.name || '').localeCompare(String(a.queueId || a.name || ''));
      });
    }


    function parseOperationLog(content) {
      const fields = {};
      String(content || '').split(/\r?\n/).forEach((line) => {
        const index = line.indexOf(':');
        if (index <= 0) return;
        fields[line.slice(0, index)] = line.slice(index + 1).trim();
      });
      return fields;
    }


    function formatLogEpoch(value) {
      const seconds = Number(value || 0);
      return seconds > 0 ? formatDate(seconds) : '-';
    }


    function formatLogBytes(value) {
      const match = /^\s*(-?\d+)\s*\/\s*(-?\d+)\s*$/.exec(value || '');
      if (!match) return value || '-';
      const copied = Number(match[1]);
      const total = Number(match[2]);
      if (total <= 0 && copied <= 0) return '-';
      return shortSize(copied) + ' / ' + shortSize(total);
    }


    function renderLogModal(log, content, truncated, loading) {
      const modal = el('log-modal');
      const body = el('log-modal-body');
      const title = el('log-modal-title');
      const fields = parseOperationLog(content);
      const queueStatus = log && log.source !== 'log' ? activityStatus(log) : '';
      const result = queueStatus && queueStatus !== 'unknown' ? queueStatus :
        (fields.Result || activityStatus(log));
      const operation = fields.Operation || activityKindLabel((log && (log.kind || log.operation)) || '');
      const error = fields.Error || (log && log.error) || '';
      const logName = (log && (log.logName || log.name)) || '-';

      title.textContent = operation + ' - ' + logResultLabel(result);
      body.textContent = '';

      const rows = [
        ['Result', logResultLabel(result)],
        ['Operation', operation],
        ['Target', fields.Target || (log && (log.target || log.destPath)) || '-'],
        ['Name', (log && log.displayName) || '-'],
        ['Queue ID', (log && log.source !== 'log' && log.queueId) || '-'],
        ['Started', fields.Started ? formatLogEpoch(fields.Started) : formatDate(Number(log && log.startedAt || 0))],
        ['Ended', fields.Ended ? formatLogEpoch(fields.Ended) : formatDate(Number(log && log.endedAt || 0))],
        ['Duration', fields.DurationSeconds ? shortDuration(Number(fields.DurationSeconds)) : '-'],
        ['Bytes', fields.Bytes ? formatLogBytes(fields.Bytes) :
          (Number(log && log.totalBytes || 0) > 0 ?
            shortSize(Number(log && log.copiedBytes || 0)) + ' / ' +
            shortSize(Number(log && log.totalBytes || 0)) : '-')],
        ['Items', fields.Items || (Number(log && log.totalItems || 0) > 0 ?
          String(Number(log && log.doneItems || 0)) + ' / ' + String(Number(log && log.totalItems || 0)) : '-')],
        ['Failed items', fields.FailedItems || String(Number(log && log.failedItems || 0))],
        ['Current', fields.Current || '-'],
        ['Log file', logName]
      ];
      if (error && error !== 'none') rows.splice(3, 0, ['Error', error]);

      const grid = document.createElement('div');
      grid.className = 'detail-grid';
      rows.forEach((row) => grid.appendChild(detailRow(row[0], row[1])));
      body.appendChild(grid);

      const actions = document.createElement('div');
      actions.className = 'modal-actions';
      if (canCancelActivity(log)) {
        const cancel = document.createElement('button');
        cancel.type = 'button';
        cancel.className = 'danger';
        cancel.textContent = 'Cancel';
        cancel.addEventListener('click', () => cancelActivity(log));
        actions.appendChild(cancel);
      }
      if (canRetryActivity(log)) {
        const retry = document.createElement('button');
        retry.type = 'button';
        retry.className = 'primary';
        retry.textContent = 'Retry';
        retry.addEventListener('click', () => retryActivity(log));
        actions.appendChild(retry);
      }
      if (actions.childNodes.length) body.appendChild(actions);

      const pre = document.createElement('pre');
      pre.className = 'log-content';
      pre.textContent = loading ? 'Loading log details...' :
        (content || 'No detailed log body was returned.');
      if (truncated) pre.textContent += '\n\n[truncated]';
      body.appendChild(pre);

      modal.classList.remove('hidden');
    }


    function closeLogModal() {
      el('log-modal').classList.add('hidden');
    }


    function showLogsLoading() {
      setSideMode('activity');
      const root = el('side-logs');
      root.textContent = '';
      const toolbar = document.createElement('div');
      toolbar.className = 'log-toolbar';
      toolbar.textContent = 'Loading activity';
      root.appendChild(toolbar);
    }


    function drawLogs() {
      const root = el('side-logs');
      root.textContent = '';

      const toolbar = document.createElement('div');
      toolbar.className = 'log-toolbar';
      const title = document.createElement('strong');
      title.textContent = 'Activity';
      const spacer = document.createElement('span');
      spacer.className = 'spacer';
      const refreshButton = document.createElement('button');
      refreshButton.type = 'button';
      refreshButton.textContent = 'Refresh';
      refreshButton.addEventListener('click', () => refreshLogs({
        activate: true,
        preserveSelection: true
      }));
      const clearButton = document.createElement('button');
      clearButton.type = 'button';
      clearButton.className = 'danger';
      clearButton.textContent = 'Clear Finished';
      clearButton.addEventListener('click', clearLogs);
      toolbar.appendChild(title);
      toolbar.appendChild(spacer);
      toolbar.appendChild(refreshButton);
      toolbar.appendChild(clearButton);
      root.appendChild(toolbar);

      const list = document.createElement('div');
      list.className = 'log-list';
      root.appendChild(list);

      if (!state.logs.length) {
        const empty = document.createElement('div');
        empty.className = 'log-entry';
        empty.innerHTML = '<span class="log-status-icon"></span><span class="log-main"><strong>No activity yet</strong><span>Queued and finished operations will appear here.</span><span class="log-time">/data/FileExplorer/logs</span></span>';
        list.appendChild(empty);
      }

      for (const log of state.logs) {
        const row = document.createElement('button');
        row.type = 'button';
        const status = activityStatus(log);
        const resultClass = ['success', 'running', 'queued', 'cancelled', 'abandoned'].includes(status)
          ? status
          : 'failed';
        row.className = 'log-entry ' + resultClass;
        row.classList.toggle('owned', !!log.owned && (status === 'queued' || status === 'running'));
        row.classList.toggle('selected', (log.queueId || log.name) === state.selectedLog);

        const icon = document.createElement('span');
        icon.className = 'log-status-icon';
        icon.innerHTML = logStatusSvg(resultClass);

        const main = document.createElement('span');
        main.className = 'log-main';
        const name = document.createElement('strong');
        name.textContent = activityKindLabel(log.kind || log.operation) +
          (log.displayName ? ' - ' + log.displayName : '');
        const target = document.createElement('span');
        target.textContent = (log.target || log.destPath) && (log.target || log.destPath) !== '-' ?
          (log.target || log.destPath) : (log.error || log.logName || log.name || '');
        const meta = document.createElement('span');
        meta.className = 'log-time';
        meta.textContent = activityMeta(log);
        main.appendChild(name);
        main.appendChild(target);
        const warning = activityWarning(log);
        if (warning) {
          const note = document.createElement('span');
          note.className = 'activity-warning';
          note.textContent = warning;
          main.appendChild(note);
        }
        if (status === 'running' && Number(log.totalBytes || 0) > 0) {
          const meter = document.createElement('span');
          meter.className = 'activity-meter';
          const fill = document.createElement('span');
          fill.style.width = activityPercent(log).toFixed(1) + '%';
          meter.appendChild(fill);
          main.appendChild(meter);
        }
        main.appendChild(meta);

        row.appendChild(icon);
        row.appendChild(main);
        row.addEventListener('click', () => openLog(log));
        list.appendChild(row);
      }

      updatePlaces();
    }


    async function openLog(log) {
      state.selectedLog = log.queueId || log.name;
      drawLogs();
      renderLogModal(log, '', false, true);
      const name = log && (log.logName || log.name);
      if (name) {
        try {
          const data = await api('/api/fs/logs/read?name=' + encodeURIComponent(name));
          renderLogModal(log, data.content || '', data.truncated, false);
        } catch (err) {
          renderLogModal(log, '', false, false);
        }
      } else {
        renderLogModal(log, '', false, false);
      }
    }


    async function refreshLogs(options) {
      const opts = options || {};
      if (opts.activate !== false) setSideMode('activity');
      if (!opts.preserveSelection) state.selectedLog = '';
      if (!opts.quiet) showLogsLoading();
      try {
        const data = await api('/api/fs/activity/poll?clientId=' +
          encodeURIComponent(activityClientId()) + '&owned=' +
          encodeURIComponent(activityOwnedIds()));
        state.logs = sortActivityItems(data.items || []);
        drawLogs();
        if (data.start) startQueuedActivity(data.start);
      } catch (err) {
        if (!opts.quiet) {
          state.logs = [];
          drawLogs();
          toast('activity: ' + err.message, 'err');
        }
      }
    }


    async function clearLogs() {
      if (!confirm('Clear finished Activity records and operation log files from the PS5?')) return;
      try {
        const result = await api('/api/fs/activity/clear');
        state.logs = [];
        state.selectedLog = '';
        closeLogModal();
        drawLogs();
        toast('Removed ' + Number(result.removed || 0) + ' finished log file(s)', 'ok');
      } catch (err) {
        toast('clear activity: ' + err.message, 'err');
      }
    }


    function canCancelActivity(item) {
      const status = activityStatus(item);
      return !!(item && item.source !== 'log' && item.owned &&
        (status === 'queued' || status === 'running'));
    }


    function canRetryActivity(item) {
      const status = activityStatus(item);
      return !!(item && item.source !== 'log' &&
        (status === 'failed' || status === 'cancelled' || status === 'abandoned') &&
        state.localQueue.has(item.queueId));
    }


    async function cancelActivity(item) {
      if (!item || !item.queueId) return;
      if (item.queueId === state.activeQueueId) {
        state.uploadAbort = true;
        Array.from(state.uploadXhrs).forEach((xhr) => xhr.abort());
      }
      try {
        await api('/api/fs/activity/cancel?queueId=' + encodeURIComponent(item.queueId));
        const local = state.localQueue.get(item.queueId);
        if (local) local.status = 'cancelled';
        closeLogModal();
        scheduleLogsReveal();
        toast('Activity cancelled', 'err');
      } catch (err) {
        toast('activity cancel: ' + err.message, 'err');
      }
    }


    async function activityProgress(queue, copied, total, done, failed, force) {
      if (!queue || !queue.queueId || !queue.leaseToken) return;
      const now = Date.now();
      if (!force && now - state.activeActivityProgressAt < 700) return;
      state.activeActivityProgressAt = now;
      const url = '/api/fs/activity/progress?queueId=' + encodeURIComponent(queue.queueId) +
        '&leaseToken=' + encodeURIComponent(queue.leaseToken) +
        '&copied=' + encodeURIComponent(String(Math.max(0, Math.round(copied || 0)))) +
        '&total=' + encodeURIComponent(String(Math.max(0, Math.round(total || 0)))) +
        '&done=' + encodeURIComponent(String(Math.max(0, Math.round(done || 0)))) +
        '&failed=' + encodeURIComponent(String(Math.max(0, Math.round(failed || 0))));
      api(url).catch(() => {});
    }


    async function activityComplete(queue, status, error, copied, total, done, failed) {
      if (!queue || !queue.queueId || !queue.leaseToken) return;
      const url = '/api/fs/activity/complete?queueId=' + encodeURIComponent(queue.queueId) +
        '&leaseToken=' + encodeURIComponent(queue.leaseToken) +
        '&status=' + encodeURIComponent(status || 'failed') +
        '&error=' + encodeURIComponent(error || '') +
        '&copied=' + encodeURIComponent(String(Math.max(0, Math.round(copied || 0)))) +
        '&total=' + encodeURIComponent(String(Math.max(0, Math.round(total || 0)))) +
        '&done=' + encodeURIComponent(String(Math.max(0, Math.round(done || 0)))) +
        '&failed=' + encodeURIComponent(String(Math.max(0, Math.round(failed || 0))));
      await api(url).catch(() => {});
    }


    async function enqueueLocalActivity(kind, displayName, destPath, totalBytes, totalItems, payload) {
      const localId = nextLocalId(kind);
      const url = '/api/fs/activity/enqueue?clientId=' + encodeURIComponent(activityClientId()) +
        '&localId=' + encodeURIComponent(localId) +
        '&kind=' + encodeURIComponent(kind) +
        '&name=' + encodeURIComponent(displayName || kind) +
        '&dest=' + encodeURIComponent(destPath || state.path) +
        '&bytes=' + encodeURIComponent(String(Math.max(0, Math.round(totalBytes || 0)))) +
        '&items=' + encodeURIComponent(String(Math.max(0, Math.round(totalItems || 0))));
      const data = await api(url);
      const queueId = data.queueId;
      const item = Object.assign({}, payload || {}, {
        queueId,
        localId,
        kind,
        displayName: displayName || kind,
        destPath: destPath || state.path,
        totalBytes: totalBytes || 0,
        totalItems: totalItems || 0,
        status: 'queued',
        leaseToken: '',
        started: false
      });
      state.localQueue.set(queueId, item);
      setSideMode('activity');
      drawLogs();
      startActivityPolling();
      scheduleLogsReveal();
      toast('Queued ' + activityKindLabel(kind) + ': ' + item.displayName, 'ok');
      return item;
    }


    async function enqueueUploadFiles(files) {
      const list = Array.from(files || []);
      if (!list.length) return;
      const totalBytes = list.reduce((sum, file) => sum + (file.size || 0), 0);
      const displayName = list.length === 1 ? list[0].name : list.length + ' upload items';
      try {
        await enqueueLocalActivity('upload', displayName, state.path, totalBytes, list.length, {
          files: list,
          basePath: state.path
        });
      } catch (err) {
        toast('activity: ' + err.message, 'err');
      }
    }


    async function enqueueZipUpload(file) {
      if (!file) return;
      setJobBox('queue', 'Inspecting ZIP', 0);
      try {
        const plan = await planZipUpload(file);
        await enqueueLocalActivity('zip', file.name, state.path, file.size || 0, plan.files || 1, {
          file,
          plan,
          basePath: state.path
        });
      } catch (err) {
        toast('zip: ' + err.message, 'err');
      } finally {
        setTimeout(() => {
          if (!state.uploadBusy && !state.jobTimer) el('job').classList.remove('show');
        }, 800);
      }
    }


    async function enqueueRarUpload(files) {
      try {
        const plan = planRarUpload(files);
        await enqueueLocalActivity('rar', plan.archiveName, state.path,
          plan.dataSize || 0, plan.volumes.length || 1, {
            files: plan.volumes.map((volume) => volume.file),
            plan,
            basePath: state.path,
            password: ''
          });
      } catch (err) {
        toast('rar: ' + err.message, 'err');
      }
    }


    async function retryActivity(item) {
      const local = item && state.localQueue.get(item.queueId);
      if (!local) {
        toast('Local files are no longer available for retry', 'err');
        return;
      }
      const payload = Object.assign({}, local, {
        queueId: '',
        leaseToken: '',
        started: false,
        status: 'queued'
      });
      if (payload.kind === 'rar') {
        const password = prompt('RAR password', payload.password || '');
        if (password === null) return;
        payload.password = password;
      }
      try {
        await enqueueLocalActivity(payload.kind, payload.displayName, payload.destPath,
          payload.totalBytes, payload.totalItems, payload);
        state.localQueue.delete(item.queueId);
        closeLogModal();
      } catch (err) {
        toast('retry: ' + err.message, 'err');
      }
    }


    function startActivityPolling() {
      if (state.activityPollTimer) return;
      state.activityPollTimer = setInterval(() => {
        refreshLogs({ activate: false, preserveSelection: true, quiet: true });
      }, ACTIVITY_POLL_MS);
    }


    function finishLocalActivity(item, status) {
      if (!item) return;
      item.status = status || item.status;
      item.started = false;
      item.leaseToken = '';
      if (status === 'success') {
        state.localQueue.delete(item.queueId);
      }
    }


    function startQueuedActivity(start) {
      if (!start || !start.queueId || !start.leaseToken) return;
      const item = state.localQueue.get(start.queueId);
      if (!item || item.started || state.activeQueueId) return;
      item.started = true;
      item.status = 'running';
      item.leaseToken = start.leaseToken;
      state.activeQueueId = item.queueId;
      state.activeLeaseToken = item.leaseToken;
      state.activeActivityProgressAt = 0;
      scheduleLogsReveal();

      (async () => {
        let result = { status: 'failed', error: 'activity failed' };
        try {
          if (item.kind === 'upload') {
            result = await runUploadFiles(item.files || [], item);
          } else if (item.kind === 'zip') {
            result = await uploadZip(item.file, item);
          } else if (item.kind === 'rar') {
            result = await uploadRar(item.files || [], item);
          } else {
            throw new Error('Unsupported activity kind');
          }
        } catch (err) {
          result = {
            status: state.uploadAbort || isCancelledError(err.message) ? 'cancelled' : 'failed',
            error: err.message || 'activity failed'
          };
          await activityComplete(item, result.status || 'failed',
            result.error, 0, item.totalBytes || 0, 0, 1);
          toast('activity: ' + result.error, 'err');
        } finally {
          state.activeQueueId = '';
          state.activeLeaseToken = '';
          finishLocalActivity(item, result.status);
          refreshLogs({ activate: true, preserveSelection: true, quiet: true });
        }
      })();
    }


    function selectedPaths() {
      return Array.from(state.selected).map((name) => joinPath(state.path, name));
    }

    function selectedEntries() {
      return state.entries.filter((entry) => state.selected.has(entry.name));
    }

    function removeEntriesFromView(names) {
      const remove = new Set(names);
      state.entries = state.entries.filter((entry) => !remove.has(entry.name));
      remove.forEach((name) => state.selected.delete(name));
      drawList();
    }

    function multiSelectRequested(event) {
      return !!(state.multiSelectLock || state.controllerMulti ||
        (event && (event.ctrlKey || event.metaKey || event.shiftKey)));
    }

    function controllerLikeClick(event, target) {
      return !!(event && target === document.activeElement &&
        (event.detail === 0 || (event.clientX === 0 && event.clientY === 0)));
    }

    function toggleMultiSelectLock() {
      state.multiSelectLock = !state.multiSelectLock;
      updateMultiSelectButton();
    }

    function updateMultiSelectButton() {
      const button = el('multi-select');
      if (!button) return;
      button.classList.toggle('active', state.multiSelectLock);
      button.setAttribute('aria-pressed', state.multiSelectLock ? 'true' : 'false');
    }

    function updateListSelectionState() {
      document.querySelectorAll('#list .file-row[data-name]').forEach((row) => {
        const selected = state.selected.has(row.dataset.name);
        row.classList.toggle('selected', selected);
        const main = row.querySelector('.row-main');
        if (main) main.setAttribute('aria-pressed', selected ? 'true' : 'false');
      });
      updateSelection();
    }

    function selectEntry(entry, additive) {
      if (additive) {
        if (state.selected.has(entry.name)) state.selected.delete(entry.name);
        else state.selected.add(entry.name);
      } else {
        state.selected.clear();
        state.selected.add(entry.name);
      }
      updateListSelectionState();
    }

    async function extractLocalArchive(entry) {
      if (!entry || entry.dir) return;
      const kind = localArchiveKind(entry.name);
      if (!kind) {
        window.open(fileUrl(joinPath(state.path, entry.name)), '_blank');
        return;
      }

      const initialDest = '/data/homebrew';
      const chosen = prompt('Extract to', initialDest);
      if (!chosen) return;
      const dest = cleanPath(chosen);
      const archivePath = joinPath(state.path, entry.name);
      let password = '';
      let askedPassword = false;

      for (;;) {
        const verb = kind === 'rar' ? 'unrar' : 'unzip';
        let url = '/api/fs/extract?path=' + encodeURIComponent(archivePath) +
          '&dest=' + encodeURIComponent(dest);
        if (password) url += '&password=' + encodeURIComponent(password);

        try {
          setSideMode('activity');
          setJobBox(verb, 'Starting local extraction', 0);
          setTimeout(() => {
            if (state.jobTimer) return;
            pollJob();
          }, 150);
          const result = await api(url);
          await waitJobIdle().catch(() => {});
          await openPath(dest).catch(() => refresh());
          toast('Extracted to ' + (result.path || dest), 'ok');
          scheduleLogsReveal();
          return;
        } catch (err) {
          if (kind === 'rar' && isRarPasswordError(err.message)) {
            const nextPassword = prompt(askedPassword ?
              'Wrong RAR password. Try again' :
              'RAR password may be required');
            if (nextPassword === null) {
              toast('RAR password required', 'err');
              return;
            }
            password = nextPassword;
            askedPassword = true;
            continue;
          }
          toast('extract: ' + err.message, 'err');
          await refresh().catch(() => {});
          return;
        }
      }
    }

    function renderRestoreModal(entry, backups, loading, error) {
      const modal = el('log-modal');
      const body = el('log-modal-body');
      const title = el('log-modal-title');
      const target = joinPath(state.path, entry.name);
      title.textContent = 'Restore Backup';
      body.textContent = '';

      const rows = [
        ['Folder', entry.name],
        ['Path', target],
        ['Backups', loading ? 'Loading' : String((backups || []).length)]
      ];
      if (error) rows.push(['Error', error]);
      const grid = document.createElement('div');
      grid.className = 'detail-grid';
      rows.forEach((row) => grid.appendChild(detailRow(row[0], row[1])));
      body.appendChild(grid);

      if (loading) {
        const pre = document.createElement('pre');
        pre.className = 'log-content';
        pre.textContent = 'Loading backups...';
        body.appendChild(pre);
        modal.classList.remove('hidden');
        return;
      }

      if (error || !backups || !backups.length) {
        const pre = document.createElement('pre');
        pre.className = 'log-content';
        pre.textContent = error || 'No backups were found for this folder.';
        body.appendChild(pre);
        modal.classList.remove('hidden');
        return;
      }

      const list = document.createElement('div');
      list.className = 'backup-list';
      backups.forEach((backup) => {
        const item = document.createElement('div');
        item.className = 'backup-item';
        const meta = document.createElement('div');
        const name = document.createElement('strong');
        name.textContent = backup.archive || backup.id || 'Archive backup';
        const detail = document.createElement('span');
        const changed = Number(backup.old || 0) + Number(backup.added || 0);
        detail.textContent = formatDate(Number(backup.created || 0)) +
          ' - ' + changed + ' changed path' + (changed === 1 ? '' : 's') +
          (backup.complete ? '' : ' - incomplete');
        meta.appendChild(name);
        meta.appendChild(detail);
        const restore = document.createElement('button');
        restore.type = 'button';
        restore.className = 'primary';
        restore.textContent = 'Restore';
        restore.addEventListener('click', () => restoreBackup(entry, backup));
        item.appendChild(meta);
        item.appendChild(restore);
        list.appendChild(item);
      });
      body.appendChild(list);
      modal.classList.remove('hidden');
    }

    async function openRestoreBackup(entry) {
      if (!entry || !entry.dir) return;
      renderRestoreModal(entry, [], true, '');
      try {
        const target = joinPath(state.path, entry.name);
        const data = await api('/api/fs/backups/list?path=' + encodeURIComponent(target));
        renderRestoreModal(entry, data.backups || [], false, '');
      } catch (err) {
        renderRestoreModal(entry, [], false, err.message);
      }
    }

    async function restoreBackup(entry, backup) {
      if (!entry || !entry.dir || !backup || !backup.id) return;
      const target = joinPath(state.path, entry.name);
      try {
        setJobBox('restore', 'Restoring backup', 0);
        await api('/api/fs/backups/restore?path=' + encodeURIComponent(target) +
          '&id=' + encodeURIComponent(backup.id));
        closeLogModal();
        toast('Backup restored', 'ok');
        await refresh();
      } catch (err) {
        toast('restore: ' + err.message, 'err');
        openRestoreBackup(entry).catch(() => {});
      } finally {
        setTimeout(() => {
          if (!state.uploadBusy && !state.jobTimer) el('job').classList.remove('show');
        }, 900);
      }
    }

    function openEntry(entry) {
      const next = joinPath(state.path, entry.name);
      if (entry.dir) {
        openPath(next);
      } else if (localArchiveKind(entry.name)) {
        extractLocalArchive(entry);
      } else {
        window.open(fileUrl(next), '_blank');
      }
    }

    function decorateIconButtons() {
      document.querySelectorAll('button[data-icon]').forEach((button) => {
        if (button.querySelector('svg')) return;
        const label = button.textContent;
        button.textContent = '';
        const icon = document.createElement('span');
        icon.innerHTML = iconSvg(button.dataset.icon);
        const text = document.createElement('span');
        text.textContent = label;
        button.appendChild(icon);
        button.appendChild(text);
      });

    function closeRowMenus(except) {
      document.querySelectorAll('.row-menu.open').forEach((menu) => {
        if (menu === except) return;
        menu.classList.remove('open');
        const button = menu.parentElement && menu.parentElement.querySelector('.row-more');
        if (button) button.setAttribute('aria-expanded', 'false');
      });
    }

    function positionFloatingMenu(menu, anchor) {
      const gap = 6;
      const margin = 8;
      const rect = anchor.getBoundingClientRect();
      const width = menu.offsetWidth || 150;
      const height = menu.offsetHeight || 104;
      let left = rect.right - width;
      let top = rect.bottom + gap;

      left = Math.max(margin, Math.min(left, window.innerWidth - width - margin));
      if (top + height > window.innerHeight - margin) {
        top = Math.max(margin, rect.top - height - gap);
      }

      menu.style.left = left + 'px';
      menu.style.top = top + 'px';
    }

    function insideClass(target, className) {
      for(let node = target; node && node !== document; node = node.parentNode) {
        if(node.classList && node.classList.contains(className)) return true;
      }
      return false;
    }

    function makeMenuButton(icon, label, handler, className) {
      const button = document.createElement('button');
      button.type = 'button';
      if (className) button.className = className;
      button.innerHTML = iconSvg(icon) + '<span></span>';
      button.querySelector('span').textContent = label;
      button.addEventListener('click', (event) => {
        event.stopPropagation();
        closeRowMenus();
        handler();
      });
      return button;
    }

    function attachRowMenu(row, entry) {
      const actions = row.querySelector('.row-actions');
      if (!actions) return;

      const more = document.createElement('button');
      more.type = 'button';
      more.className = 'row-more';
      more.setAttribute('aria-label', 'Actions for ' + entry.name);
      more.setAttribute('aria-haspopup', 'menu');
      more.setAttribute('aria-expanded', 'false');
      more.innerHTML = iconSvg('more');

      const menu = document.createElement('div');
      menu.className = 'row-menu';
      menu.setAttribute('role', 'menu');
      if (!entry.dir && localArchiveKind(entry.name)) {
        menu.appendChild(makeMenuButton('extract', 'Extract', () => extractLocalArchive(entry)));
      }
      if (entry.dir && backupCount(entry) > 0) {
        const backup = document.createElement('button');
        backup.type = 'button';
        backup.className = 'backup-indicator';
        backup.setAttribute('aria-label', 'Restore backups for ' + entry.name);
        backup.title = backupCount(entry) + ' backup' + (backupCount(entry) === 1 ? '' : 's');
        backup.innerHTML = iconSvg('backup');
        backup.addEventListener('click', (event) => {
          event.stopPropagation();
          closeRowMenus();
          openRestoreBackup(entry);
        });
        actions.appendChild(backup);
        menu.appendChild(makeMenuButton('backup', 'Restore Backup', () => openRestoreBackup(entry)));
      }
      if (entry.dir) {
        menu.appendChild(makeMenuButton('permissions', 'Make Executable', () => chmodEntry(entry)));
      }
      menu.appendChild(makeMenuButton('download', 'Download', () => downloadEntry(entry)));
      menu.appendChild(makeMenuButton('rename', 'Rename', () => renameEntry(entry)));
      menu.appendChild(makeMenuButton('delete', 'Delete', () => deleteEntry(entry), 'danger'));

      menu.addEventListener('keydown', (event) => {
        const buttons = Array.from(menu.querySelectorAll('button'));
        const index = buttons.indexOf(document.activeElement);
        if (event.key === 'Escape') {
          event.preventDefault();
          closeRowMenus();
          more.focus();
          return;
        }
        if (event.key !== 'ArrowDown' && event.key !== 'ArrowUp') return;
        event.preventDefault();
        const delta = event.key === 'ArrowDown' ? 1 : -1;
        buttons[(index + delta + buttons.length) % buttons.length].focus();
      });

      more.addEventListener('click', (event) => {
        event.stopPropagation();
        const open = !menu.classList.contains('open');
        closeRowMenus(menu);
        menu.classList.toggle('open', open);
        more.setAttribute('aria-expanded', open ? 'true' : 'false');
        if (open && (event.detail === 0 || more === document.activeElement)) {
          const first = menu.querySelector('button');
          if (first) setTimeout(() => first.focus(), 0);
        }
      });

      actions.appendChild(more);
      actions.appendChild(menu);
    }
