    async function loadFolderSize(path, token, entry) {
      try {
        const du = await api('/api/fs/du?path=' + encodeURIComponent(path));
        if (token !== state.detailToken) return;
        if (!state.selected.has(entry.name)) return;

        const rows = [
          ['Kind', 'Folder'],
          ['Size', exactSize(du.size)],
          ['Files', String(du.files || 0)],
          ['Folders', String(Math.max(0, (du.dirs || 0) - 1))],
          ['Path', path]
        ];
        const note = 'Full recursive size calculated on selection only.';
        renderDetail(entry.name, rows, note);
      } catch (err) {
        if (token !== state.detailToken) return;
        const rows = [
          ['Kind', 'Folder'],
          ['Size', exactSize(entry.size)],
          ['Modified', formatDate(entry.mtime)],
          ['Path', path]
        ];
        renderDetail(entry.name, rows, 'Could not calculate folder size: ' + err.message);
      }
    }

    function updatePlaces() {
      document.querySelectorAll('#places button[data-path]').forEach((button) => {
        button.classList.toggle('active',
          state.sideMode === 'paths' && cleanPath(button.dataset.path) === state.path);
      });
      document.querySelectorAll('[data-side-mode]').forEach((button) => {
        const active = button.dataset.sideMode === state.sideMode;
        button.classList.toggle('active', active);
        button.setAttribute('aria-selected', active ? 'true' : 'false');
      });
    }

    function updateSelection() {
      const token = ++state.detailToken;
      const entries = selectedEntries();
      el('selection').textContent = entries.length + ' selected';

      const detail = el('detail');
      if (!entries.length) {
        renderDetail('No selection', [
          ['Path', state.path],
          ['Items', state.entries.length + ' visible']
        ], 'Select a file or folder to see size and modified date.');
        return;
      }

      const dirs = entries.filter((entry) => entry.dir).length;
      const files = entries.length - dirs;
      if (entries.length === 1) {
        const entry = entries[0];
        const path = joinPath(state.path, entry.name);
        const rows = [
          ['Kind', entry.dir ? 'Folder' : 'File'],
          ['Size', exactSize(entry.size)],
          ['Modified', formatDate(entry.mtime)],
          ['Path', path]
        ];
        let note = '';
        if (entry.dir) {
          note = 'Calculating full folder size...';
          loadFolderSize(path, token, entry);
        }
        renderDetail(entry.name, rows, note);
        return;
      }

      const totalFileBytes = entries.reduce((sum, entry) => {
        return entry.dir || !Number.isFinite(entry.size) ? sum : sum + entry.size;
      }, 0);
      renderDetail(entries.length + ' items', [
        ['Files', String(files)],
        ['Folders', String(dirs)],
        ['File size', exactSize(totalFileBytes)],
        ['Location', state.path]
      ], dirs ? 'Folder contents are not included in the total.' : '');
    }

    function makeRow(entry, parent) {
      const row = document.createElement('div');
      row.className = 'file-row ' + (entry.dir ? 'dir ' : '') + (parent ? 'parent' : '');
      if (!parent && backupCount(entry) > 0) row.classList.add('has-backups');
      row.innerHTML =
        '<button type="button" class="row-main"><span class="icon-cell"></span><span class="name"></span><span class="muted-cell type"></span><span class="muted-cell mtime"></span></button><span class="row-actions"></span>';

      const main = row.querySelector('.row-main');
      main.setAttribute('aria-label', parent ? 'Parent folder' : entry.name);
      main.querySelector('.icon-cell').innerHTML = iconSvg(entry.dir ? 'folder' : 'file');
      main.querySelector('.name').textContent = entry.name;
      main.querySelector('.type').textContent = parent ? '' : (entry.dir ? 'folder' : shortSize(entry.size || 0));
      main.querySelector('.mtime').textContent = entry.mtime ? new Date(entry.mtime * 1000).toLocaleDateString() : '';

      if (!parent && state.selected.has(entry.name)) {
        row.classList.add('selected');
      }
      if (!parent) {
        row.dataset.name = entry.name;
        main.setAttribute('aria-pressed', state.selected.has(entry.name) ? 'true' : 'false');
      }

      main.addEventListener('click', (event) => {
        if (parent) {
          openPath(parentPath(state.path));
          return;
        }
        selectEntry(entry, multiSelectRequested(event) || controllerLikeClick(event, main));
      });

      main.addEventListener('dblclick', () => {
        if (parent) {
          return;
        }
        openEntry(entry);
      });

      if (!parent) {
        attachRowMenu(row, entry);
      }

      return row;
    }

    function makeNewFolderRow() {
      const row = document.createElement('div');
      row.className = 'file-row dir new-folder-inline';

        '<button type="button" class="row-main"><span class="icon-cell"></span><span class="name"></span><span class="muted-cell type"></span><span class="muted-cell mtime"></span></button><span class="row-actions"></span>';

      main.setAttribute('aria-label', 'New Folder');

      main.querySelector('.name').textContent = 'New Folder';

    function drawList() {
      const list = el('list');
      list.textContent = '';

      const head = document.createElement('div');
      head.className = 'file-head';
      head.innerHTML = '<span></span><span>Name</span><span>Type</span><span>Modified</span><span></span>';
      list.appendChild(head);

      if (state.path !== '/') {
        list.appendChild(makeRow({ name: '..', dir: true }, true));
      }
      list.appendChild(makeNewFolderRow());

      for (const entry of state.entries) {
        list.appendChild(makeRow(entry, false));
      }

      updatePlaces();
      updateSelection();

    function showLoading() {
      const list = el('list');
      list.textContent = '';
      const head = document.createElement('div');
      head.className = 'file-head';
      head.innerHTML = '<span></span><span>Name</span><span>Type</span><span>Modified</span><span></span>';
      const row = document.createElement('div');
      row.className = 'file-row';
      row.innerHTML = '<button type="button" class="row-main" disabled><span class="icon-cell"></span><span class="name">Loading</span><span></span><span></span></button><span></span>';
      list.appendChild(head);
      list.appendChild(row);
    }

    async function refresh() {
      state.path = cleanPath(el('path').value || state.path);
      el('path').value = state.path;
      showLoading();

      try {
        const data = await api('/api/fs/list?path=' + encodeURIComponent(state.path));
        state.entries = sortEntries(data.entries || []);
        state.selected.clear();
        saveLastPath(state.path);
        drawList();
      } catch (err) {
        state.entries = [];
        drawList();
        toast(err.message, 'err');
      }
    }

    async function openPath(path) {
      state.path = cleanPath(path);
      el('path').value = state.path;
      await refresh();
    }

    async function transfer(verb) {
      const paths = selectedPaths();
      const target = cleanPath(el('target-path').value);
      if (!paths.length) {
        toast('No selection', 'err');
        return;
      }

      let started = 0;
      const startedNames = [];
      for (const source of paths) {
        try {
          await api('/api/fs/' + verb +
            '?src=' + encodeURIComponent(source) +
            '&dst=' + encodeURIComponent(target));
          started++;
          startedNames.push(source.slice(source.lastIndexOf('/') + 1));
        } catch (err) {
          toast(verb + ': ' + err.message, 'err');
        }
      }

      if (started > 0) {
        if (verb === 'move') removeEntriesFromView(startedNames);
        toast((verb === 'move' ? 'Move' : 'Copy') + ' started for ' +
          started + ' item(s)', 'ok');
        scheduleLogsReveal();
      }
    }

    async function waitJobIdle() {
      let missed = 0;
      for (;;) {
        try {
          const job = await api('/api/fs/job/status');
          missed = 0;
          if (!job.busy) return job;
        } catch (err) {
          missed++;
          if (missed >= 600) throw err;
        }
        await new Promise((resolve) => setTimeout(resolve, 700));
      }
    }

    async function jobErrorAfterUploadFailure(timeoutMs) {
      const end = Date.now() + timeoutMs;
      let sawJob = false;
      while (Date.now() < end) {
        try {
          const job = await api('/api/fs/job/status');
          sawJob = true;
          if (!job.busy) return job.error || '';
        } catch (err) {
          if (!sawJob) return '';
        }
        await new Promise((resolve) => setTimeout(resolve, 350));
      }
      return '';
    }

    function warnIfUploadBackgrounded() {
      if (!document.hidden || !state.uploadBusy) return;
      const now = Date.now();
      if (now - state.lastBackgroundWarningAt < 5000) return;
      state.lastBackgroundWarningAt = now;
      setSideMode('activity');
      toast('Keep this upload tab open and foreground; backgrounding can interrupt the stream.', 'err');
    }

    async function makeFolder() {
      const name = prompt('Folder name');
      if (!name) return;
      try {
        await api('/api/fs/mkdir?path=' + encodeURIComponent(joinPath(state.path, name)));
        await refresh();
        toast('Folder created', 'ok');
      } catch (err) {
        toast('mkdir: ' + err.message, 'err');
      }
    }

    async function renameEntry(entry) {
      const next = prompt('New name', entry.name);
      if (!next || next === entry.name) return;
      try {
        await api('/api/fs/rename?src=' +
          encodeURIComponent(joinPath(state.path, entry.name)) +
          '&dst=' + encodeURIComponent(joinPath(state.path, next)));
        await refresh();
        toast('Renamed', 'ok');
      } catch (err) {
        toast('rename: ' + err.message, 'err');
      }
    }

    async function renameOne() {
      const entries = selectedEntries();
      if (entries.length !== 1) {
        toast('Select one item', 'err');
        return;
      }
      await renameEntry(entries[0]);
    }

    function downloadEntry(entry) {
      if (entry.dir) {
        toast('Download supports files only', 'err');
        return;
      }
      window.open(fileUrl(joinPath(state.path, entry.name)), '_blank');
    }

    function downloadSelected() {
      const entries = selectedEntries();
      if (entries.length !== 1 || entries[0].dir) {
        toast('Select one file', 'err');
        return;
      }
      downloadEntry(entries[0]);
    }

    async function chmodEntry(entry) {
      if (!entry || !entry.dir) {
        toast('Select one folder', 'err');
        return;
      }
      if (!confirm('Set 777 recursively for ' + entry.name + '?')) return;
      const path = joinPath(state.path, entry.name);
      try {
        await api('/api/fs/chmod777?path=' + encodeURIComponent(path));
        toast('Permission update started', 'ok');
        scheduleLogsReveal();
      } catch (err) {
        toast('permissions: ' + err.message, 'err');
        scheduleLogsReveal();
      }
    }

    function runBackgroundDeletes(paths) {
      (async () => {
        for (const path of paths) {
          try {
            await api('/api/fs/delete?recursive=1&path=' + encodeURIComponent(path));
          } catch (err) {
            toast('delete: ' + err.message, 'err');
            await refresh().catch(() => {});
            return;
          }
        }
        scheduleLogsReveal();
      })();
    }

    async function deleteEntry(entry) {
      if (!confirm('Delete ' + entry.name + '?')) return;
      const path = joinPath(state.path, entry.name);
      removeEntriesFromView([entry.name]);
      toast('Delete started', 'ok');
      runBackgroundDeletes([path]);
    }

    async function deleteSelected() {
      const paths = selectedPaths();
      if (!paths.length) {
        toast('No selection', 'err');
        return;
      }
      if (!confirm('Delete ' + paths.length + ' item(s)?')) return;

      const names = Array.from(state.selected);
      removeEntriesFromView(names);
      toast('Delete started for ' + paths.length + ' item(s)', 'ok');
      runBackgroundDeletes(paths);
    }

    function sendUploadRequest(url, body, onProgress, size) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();

        function clearXhr() {
          state.uploadXhrs.delete(xhr);
        }

        state.uploadXhrs.add(xhr);
        xhr.open('POST', url);
        xhr.upload.onprogress = (event) => {
          const loaded = Math.min(size, Number(event.loaded || 0));
          if (onProgress) onProgress(loaded);
        };
        xhr.onload = () => {
          clearXhr();
          let body = {};
          try { body = JSON.parse(xhr.responseText || '{}'); } catch (err) {}
          if (xhr.status >= 200 && xhr.status < 300 && body.ok !== false) {
            resolve(body);
          } else {
            reject(new Error(body.error || ('HTTP ' + xhr.status)));
          }
        };
        xhr.onerror = () => {
          clearXhr();
          reject(new Error('browser upload interrupted'));
        };
        xhr.onabort = () => {
          clearXhr();
          reject(new Error('upload cancelled'));
        };
        try {
          xhr.send(body);
        } catch (err) {
          clearXhr();
          reject(err);
        }
      });
    }

    function uploadUrl(endpoint, file, basePath, relPath, extra, queue) {
      let url = endpoint + '?path=' + encodeURIComponent(basePath) +
        '&filename=' + encodeURIComponent(file.name);
      if (relPath) url += '&relpath=' + encodeURIComponent(relPath);
      if (extra) url += extra;
      url += activityLeaseExtra(queue);
      return url;
    }

    function uploadTargetPath(file, basePath, relPath) {
      let path = basePath;
      if (relPath) {
        relPath.split('/').forEach((segment) => {
          if (segment) path = joinPath(path, segment);
        });
      }
      return joinPath(path, file.name);
    }

    async function uploadChunked(file, basePath, relPath, onProgress, queue) {
      const chunks = [];
      for (let offset = 0; offset < file.size; offset += UPLOAD_CHUNK_SIZE) {
        const size = Math.min(UPLOAD_CHUNK_SIZE, file.size - offset);
        chunks.push({ offset, size, loaded: 0 });
      }

      let nextChunk = 0;
      let failed = false;

      function reportProgress() {
        const loaded = chunks.reduce((sum, chunk) => sum + chunk.loaded, 0);
        if (onProgress) onProgress(Math.min(file.size, loaded));
      }

      async function chunkWorker() {
        while(!state.uploadAbort && !failed) {
          const chunk = chunks[nextChunk++];
          if (!chunk) break;
          const body = file.slice(chunk.offset, chunk.offset + chunk.size);
          const extra = '&offset=' + encodeURIComponent(String(chunk.offset)) +
            '&total=' + encodeURIComponent(String(file.size));
          const url = uploadUrl('/api/fs/upload-chunk', file, basePath, relPath, extra, queue);
          try {
            await sendUploadRequest(url, body, (loaded) => {
              chunk.loaded = Math.min(chunk.size, loaded);
              reportProgress();
            }, chunk.size);
            chunk.loaded = chunk.size;
            reportProgress();
          } catch (err) {
            failed = true;
            if (!state.uploadAbort) {
              Array.from(state.uploadXhrs).forEach((xhr) => xhr.abort());
            }
            throw err;
          }
        }
      }

      const workers = Array.from({
        length: Math.min(UPLOAD_CHUNK_CONCURRENCY, chunks.length)
      }, () => chunkWorker());
      const results = await Promise.allSettled(workers);
      const failedResult = results.find((result) => result.status === 'rejected');
      if (failedResult) {
        const target = uploadTargetPath(file, basePath, relPath);
        if (!queue) {
          await api('/api/fs/delete?recursive=0&path=' + encodeURIComponent(target)).catch(() => {});
        }
        throw failedResult.reason;
      }
      if (state.uploadAbort) throw new Error('upload cancelled');
      await api(uploadUrl('/api/fs/upload-complete', file, basePath, relPath,
        '&total=' + encodeURIComponent(String(file.size)), queue));
    }

    function uploadOne(file, basePath, relPath, onProgress, useChunks, queue) {
      if (useChunks && file.size >= UPLOAD_CHUNK_THRESHOLD) {
        return uploadChunked(file, basePath, relPath, onProgress, queue);
      }

      const url = uploadUrl('/api/fs/upload', file, basePath, relPath, '', queue);
      return sendUploadRequest(url, file, onProgress, file.size);
    }

    function readBlobSlice(file, start, end) {
      const blob = file.slice(start, end);
      if (blob.arrayBuffer) return blob.arrayBuffer();
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error || new Error('read failed'));
        reader.readAsArrayBuffer(blob);
      });
    }

    function getUint64(view, offset) {
      const lo = view.getUint32(offset, true);
      const hi = view.getUint32(offset + 4, true);
      const value = hi * 4294967296 + lo;
      if (!Number.isSafeInteger(value)) throw new Error('Zip is too large for this browser');
      return value;
    }

    function decodeZipName(bytes, utf8) {
      if (utf8 && window.TextDecoder) {
        try {
          return new TextDecoder('utf-8').decode(bytes);
        } catch (err) {}
      }
      let out = '';
      for (let i = 0; i < bytes.length; i += 8192) {
        out += String.fromCharCode.apply(null, bytes.subarray(i, i + 8192));
      }
      return out;
    }

    function normalizeArchivePath(name) {
      if (!name || name[0] === '/' || name[0] === '\\') {
        throw new Error('Zip contains an unsafe path');
      }
      const parts = [];
      const rawParts = name.replace(/\\/g, '/').split('/');
      for (const part of rawParts) {
        if (!part) continue;
        if (part === '.' || part === '..' || part.indexOf('\0') !== -1 ||
            part.indexOf(':') !== -1 || /[\x00-\x1f]/.test(part)) {
          throw new Error('Zip contains an unsafe path');
        }
        parts.push(part);
      }
      if (!parts.length) throw new Error('Zip contains an unsafe path');
      return parts.join('/');
    }

    function archiveHasPrefix(path, prefix) {
      return !prefix || path === prefix || path.startsWith(prefix + '/');
    }

    function archiveAfterPrefix(path, prefix) {
      if (!prefix) return path;
      if (path === prefix) return '';
      return path.slice(prefix.length + 1);
    }

    function appFolderFromSegment(segment) {
      const match = /^PPSA([0-9A-Z]{5})-app$/i.exec(segment || '');
      return match ? 'PPSA' + match[1].toUpperCase() + '-app' : '';
    }

    function findZipEocd(bytes) {
      for (let i = bytes.length - 22; i >= 0; i--) {
        if (bytes[i] !== 0x50 || bytes[i + 1] !== 0x4b ||
            bytes[i + 2] !== 0x05 || bytes[i + 3] !== 0x06) {
          continue;
        }
        const commentLen = bytes[i + 20] | (bytes[i + 21] << 8);
        if (i + 22 + commentLen === bytes.length) return i;
      }
      return -1;
    }

    async function readZipDirectory(file) {
      if (!file || file.size < 22) throw new Error('Not a zip file');
      const tailStart = Math.max(0, file.size - ZIP_EOCD_MAX);
      const tailBytes = new Uint8Array(await readBlobSlice(file, tailStart, file.size));
      const tailView = new DataView(tailBytes.buffer, tailBytes.byteOffset, tailBytes.byteLength);
      const eocd = findZipEocd(tailBytes);
      if (eocd < 0) throw new Error('Could not find zip directory');

      const diskNo = tailView.getUint16(eocd + 4, true);
      const cdDisk = tailView.getUint16(eocd + 6, true);
      let entriesThisDisk = tailView.getUint16(eocd + 8, true);
      let totalEntries = tailView.getUint16(eocd + 10, true);
      let cdSize = tailView.getUint32(eocd + 12, true);
      let cdOffset = tailView.getUint32(eocd + 16, true);

      if (diskNo !== 0 || cdDisk !== 0 || entriesThisDisk !== totalEntries) {
        throw new Error('Multi-disk zip archives are not supported');
      }

      if (totalEntries === 0xffff || cdSize === 0xffffffff || cdOffset === 0xffffffff) {
        const locator = eocd - 20;
        if (locator < 0 || tailView.getUint32(locator, true) !== 0x07064b50) {
          throw new Error('Bad Zip64 directory');
        }
        const zip64Disk = tailView.getUint32(locator + 4, true);
        const zip64Offset = getUint64(tailView, locator + 8);
        const diskCount = tailView.getUint32(locator + 16, true);
        if (zip64Disk !== 0 || diskCount !== 1) {
          throw new Error('Multi-disk zip archives are not supported');
        }

        const zip64Fixed = new Uint8Array(await readBlobSlice(file, zip64Offset, zip64Offset + 56));
        const zip64View = new DataView(zip64Fixed.buffer, zip64Fixed.byteOffset, zip64Fixed.byteLength);
        if (zip64View.getUint32(0, true) !== 0x06064b50) {
          throw new Error('Bad Zip64 directory');
        }
        if (zip64View.getUint32(16, true) !== 0 || zip64View.getUint32(20, true) !== 0) {
          throw new Error('Multi-disk zip archives are not supported');
        }
        entriesThisDisk = getUint64(zip64View, 24);
        totalEntries = getUint64(zip64View, 32);
        cdSize = getUint64(zip64View, 40);
        cdOffset = getUint64(zip64View, 48);
        if (entriesThisDisk !== totalEntries) {
          throw new Error('Multi-disk zip archives are not supported');
        }
      }

      if (cdSize <= 0 || cdSize > ZIP_CENTRAL_DIR_MAX ||
          cdOffset < 0 || cdOffset + cdSize > file.size) {
        throw new Error('Zip directory is too large or invalid');
      }

      const cdBytes = new Uint8Array(await readBlobSlice(file, cdOffset, cdOffset + cdSize));
      const cdView = new DataView(cdBytes.buffer, cdBytes.byteOffset, cdBytes.byteLength);
      const entries = [];
      let pos = 0;
      for (let index = 0; index < totalEntries; index++) {
        if (pos + 46 > cdBytes.length || cdView.getUint32(pos, true) !== 0x02014b50) {
          throw new Error('Bad zip directory');
        }
        const flags = cdView.getUint16(pos + 8, true);
        const method = cdView.getUint16(pos + 10, true);
        const nameLen = cdView.getUint16(pos + 28, true);
        const extraLen = cdView.getUint16(pos + 30, true);
        const commentLen = cdView.getUint16(pos + 32, true);
        const diskStart = cdView.getUint16(pos + 34, true);
        const nameStart = pos + 46;
        const nameEnd = nameStart + nameLen;
        const next = nameEnd + extraLen + commentLen;
        if (nameEnd > cdBytes.length || next > cdBytes.length) {
          throw new Error('Bad zip directory');
        }
        if (diskStart !== 0) throw new Error('Multi-disk zip archives are not supported');
        const rawName = decodeZipName(cdBytes.subarray(nameStart, nameEnd),
          (flags & ZIP_FLAG_UTF8) !== 0);
        entries.push({
          path: normalizeArchivePath(rawName),
          rawName,
          isDir: /[\/\\]$/.test(rawName),
          flags,
          method
        });
        pos = next;
      }
      return entries;
    }

    function selectedZipEntries(entries, plan) {
      return entries.filter((entry) => {
        if (entry.isDir) return false;
        if (plan.extractPrefix && !archiveHasPrefix(entry.path, plan.extractPrefix)) return false;
        if (plan.stripPrefix && !archiveHasPrefix(entry.path, plan.stripPrefix)) return false;
        const rel = archiveAfterPrefix(entry.path, plan.stripPrefix || plan.extractPrefix || '');
        return !!rel;
      });
    }

    function chooseZipLayout(file, entries) {
      const appCandidates = [];
      for (const entry of entries) {
        const parts = entry.path.split('/');
        for (let i = 0; i < parts.length; i++) {
          const destFolder = appFolderFromSegment(parts[i]);
          if (!destFolder) continue;
          const prefix = parts.slice(0, i + 1).join('/');
          if (!appCandidates.some((candidate) => candidate.extractPrefix === prefix)) {
            appCandidates.push({
              destFolder,
              extractPrefix: prefix,
              stripPrefix: prefix
            });
          }
        }
      }
      if (appCandidates.length) {
        appCandidates.sort((a, b) => {
          const aEboot = entries.some((entry) => entry.path.toLowerCase() ===
            (a.extractPrefix + '/eboot.bin').toLowerCase());
          const bEboot = entries.some((entry) => entry.path.toLowerCase() ===
            (b.extractPrefix + '/eboot.bin').toLowerCase());
          if (aEboot !== bEboot) return aEboot ? -1 : 1;
          if (a.extractPrefix.length !== b.extractPrefix.length) {
            return a.extractPrefix.length - b.extractPrefix.length;
          }
          return a.extractPrefix.localeCompare(b.extractPrefix);
        });
        return appCandidates[0];
      }

      const title = /PPSA[0-9A-Z]{5}/i.exec(file.name || '');
      if (!title) {
        throw new Error('No PPSA title ID found in zip name or app folder');
      }
      const destFolder = title[0].toUpperCase() + '-app';
      const eboots = entries.filter((entry) => {
        const parts = entry.path.split('/');
        return !entry.isDir && parts[parts.length - 1].toLowerCase() === 'eboot.bin';
      }).sort((a, b) => {
        const aParent = parentArchivePath(a.path);
        const bParent = parentArchivePath(b.path);
        const aDepth = aParent ? aParent.split('/').length : 0;
        const bDepth = bParent ? bParent.split('/').length : 0;
        if (aDepth !== bDepth) return aDepth - bDepth;
        return a.path.localeCompare(b.path);
      });
      if (!eboots.length) {
        throw new Error('No eboot.bin found to place inside ' + destFolder);
      }
      const parent = parentArchivePath(eboots[0].path);
      return {
        destFolder,
        stripPrefix: parent,
        extractPrefix: parent
      };
    }

    function parentArchivePath(path) {
      const index = path.lastIndexOf('/');
      return index < 0 ? '' : path.slice(0, index);
    }

    async function planZipUpload(file) {
      const entries = await readZipDirectory(file);
      const plan = chooseZipLayout(file, entries);
      const selected = selectedZipEntries(entries, plan);
      if (!selected.length) throw new Error('Zip contained no matching files');
      for (const entry of selected) {
        if (entry.flags & ZIP_FLAG_ENCRYPTED) {
          throw new Error('Encrypted zip entries are not supported');
        }
        if (entry.method !== ZIP_METHOD_STORE && entry.method !== ZIP_METHOD_DEFLATE) {
          throw new Error('Unsupported zip compression method');
        }
        if (entry.method === ZIP_METHOD_STORE && (entry.flags & ZIP_FLAG_DATA_DESCRIPTOR)) {
          throw new Error('Stored zip entries with streaming descriptors are not supported');
        }
      }
      plan.files = selected.length;
      return plan;
    }

    function zipUploadUrl(file, basePath, plan, queue) {
      let url = '/api/fs/upload-zip?path=' + encodeURIComponent(basePath) +
        '&filename=' + encodeURIComponent(file.name) +
        '&files=' + encodeURIComponent(String(plan.files || 0));
      if (plan.destFolder) url += '&destFolder=' + encodeURIComponent(plan.destFolder);
      if (plan.stripPrefix) url += '&stripPrefix=' + encodeURIComponent(plan.stripPrefix);
      if (plan.extractPrefix) url += '&extractPrefix=' + encodeURIComponent(plan.extractPrefix);
      url += activityLeaseExtra(queue);
      return url;
    }

    async function uploadZip(file, queue) {
      if (!file || state.uploadBusy) return;
      state.uploadBusy = true;
      state.uploadAbort = false;
      state.uploadJobCancel = false;
      state.uploadJobVerb = '';
      state.uploadXhrs.clear();
      setJobBox('unzip', 'Inspecting zip', 0);
      let finalStatus = 'success';
      let finalError = '';

      try {
        const plan = queue && queue.plan ? queue.plan : await planZipUpload(file);
        if (state.uploadAbort) throw new Error('upload cancelled');

        state.uploadJobCancel = true;
        state.uploadJobVerb = 'unzip';
        setJobBox('unzip', 'Starting upload', 0);
        await activityProgress(queue, 0, file.size || 0, 0, 0, true);
        const url = zipUploadUrl(file, (queue && queue.basePath) || state.path, plan, queue);
        const upload = sendUploadRequest(url, file, null, file.size);
        setTimeout(() => {
          if (state.uploadBusy && state.uploadJobCancel) pollJob();
        }, 150);

        const result = await upload;
        const done = await waitJobIdle();
        if (done.error) throw new Error(done.error);
        await refresh();
        toast('Extracted ' + Number(result.files || plan.files || 0) + ' file(s)', 'ok');
      } catch (err) {
        finalStatus = state.uploadAbort || isCancelledError(err.message) ? 'cancelled' : 'failed';
        finalError = finalStatus === 'cancelled' ? 'upload cancelled' : err.message;
        if (queue) {
          await activityComplete(queue, finalStatus,
            finalError, 0, file.size || 0, 0, 1);
        }
        if (state.uploadAbort || isCancelledError(err.message)) {
          toast('Zip upload cancelled', 'err');
        } else {
          toast('zip: ' + err.message, 'err');
        }
        await refresh().catch(() => {});
      } finally {
        state.uploadBusy = false;
        state.uploadJobCancel = false;
        state.uploadJobVerb = '';
        state.uploadXhrs.clear();
        setTimeout(() => {
          if (!state.uploadBusy && !state.jobTimer) el('job').classList.remove('show');
        }, 1600);
      }
      return { status: finalStatus, error: finalError };
    }

    function classifyRarVolume(file) {
      const name = file && file.name ? file.name : '';
      const lower = name.toLowerCase();
      const part = /^(.*)\.part(\d+)\.rar$/i.exec(name);
      if (part) {
        const number = Number(part[2]);
        if (!Number.isInteger(number) || number < 1) {
          throw new Error('Bad RAR volume name: ' + name);
        }
        return {
          file,
          name,
          mode: 'part',
          base: part[1].toLowerCase(),
          index: number - 1
        };
      }
      const oldNext = /^(.*)\.r(\d{2})$/i.exec(name);
      if (oldNext) {
        return {
          file,
          name,
          mode: 'old',
          base: oldNext[1].toLowerCase(),
          index: Number(oldNext[2]) + 1
        };
      }
      if (lower.endsWith('.rar')) {
        return {
          file,
          name,
          mode: 'old',
          base: lower.slice(0, -4),
          index: 0
        };
      }
      throw new Error('Select RAR volumes only');
    }

    function planRarUpload(files) {
      const volumes = Array.from(files || []).map(classifyRarVolume);
      if (!volumes.length) throw new Error('No RAR selected');
      if (volumes.length > RAR_VOLUME_MAX) throw new Error('Too many RAR volumes selected');

      volumes.sort((a, b) => a.index - b.index || a.name.localeCompare(b.name));
      const first = volumes[0];
      if (first.index !== 0 || (first.mode === 'part' && !/\.part0*1\.rar$/i.test(first.name)) ||
          (first.mode === 'old' && !/\.rar$/i.test(first.name))) {
        throw new Error('Select the first RAR volume');
      }

      const seen = new Set();
      for (let i = 0; i < volumes.length; i++) {
        const volume = volumes[i];
        if (volume.mode !== first.mode || volume.base !== first.base) {
          throw new Error('Selected RAR volumes do not belong to one set');
        }
        if (volume.index !== i || seen.has(volume.index)) {
          throw new Error('Missing or duplicate RAR volume part ' + (i + 1));
        }
        if (!Number.isSafeInteger(volume.file.size) || volume.file.size <= 0) {
          throw new Error('Bad RAR volume size: ' + volume.name);
        }
        seen.add(volume.index);
      }

      return {
        archiveName: first.name,
        volumes,
        dataSize: volumes.reduce((sum, volume) => sum + volume.file.size, 0)
      };
    }

    function setUint64(view, offset, value) {
      if (!Number.isSafeInteger(value) || value < 0) {
        throw new Error('RAR upload is too large for this browser');
      }
      const lo = value % 4294967296;
      const hi = Math.floor(value / 4294967296);
      view.setUint32(offset, lo, true);
      view.setUint32(offset + 4, hi, true);
    }

    function utf8Bytes(text) {
      if (!window.TextEncoder) throw new Error('This browser cannot encode RAR metadata');
      return new TextEncoder().encode(text || '');
    }

    function buildRarUploadBody(plan, password) {
      const archiveBytes = utf8Bytes(plan.archiveName);
      const passwordBytes = utf8Bytes(password || '');
      if (archiveBytes.length <= 0 || archiveBytes.length > 255) {
        throw new Error('RAR filename is too long');
      }
      if (passwordBytes.length > 511) {
        throw new Error('RAR password is too long');
      }

      const fixed = new Uint8Array(24);
      for (let i = 0; i < RAR_UPLOAD_MAGIC.length; i++) {
        fixed[i] = RAR_UPLOAD_MAGIC.charCodeAt(i);
      }
      const fixedView = new DataView(fixed.buffer);
      fixedView.setUint16(8, plan.volumes.length, true);
      fixedView.setUint16(10, archiveBytes.length, true);
      fixedView.setUint16(12, passwordBytes.length, true);
      fixedView.setUint16(14, 0, true);
      setUint64(fixedView, 16, plan.dataSize);

      const parts = [fixed, archiveBytes, passwordBytes];
      for (const volume of plan.volumes) {
        const nameBytes = utf8Bytes(volume.name);
        if (nameBytes.length <= 0 || nameBytes.length > 255) {
          throw new Error('RAR volume name is too long');
        }
        const record = new Uint8Array(10);
        const recordView = new DataView(record.buffer);
        recordView.setUint16(0, nameBytes.length, true);
        setUint64(recordView, 2, volume.file.size);
        parts.push(record, nameBytes);
      }
      for (const volume of plan.volumes) {
        parts.push(volume.file);
      }
      return new Blob(parts, { type: 'application/octet-stream' });
    }

    function rarUploadUrl(file, basePath, queue) {
      return '/api/fs/upload-rar?path=' + encodeURIComponent(basePath) +
        '&filename=' + encodeURIComponent(file.name) +
        activityLeaseExtra(queue);
    }

    function isRarPasswordError(message) {
      return /bad rar password|bad password|password required|missing password/i
        .test(message || '');
    }

    async function uploadRarAttempt(plan, password, queue) {
      const body = buildRarUploadBody(plan, password || '');
      if (state.uploadAbort) throw new Error('upload cancelled');

      state.uploadJobCancel = true;
      state.uploadJobVerb = 'unrar';
      setJobBox('unrar', password ? 'Retrying with password' : 'Starting upload', 0);
      await activityProgress(queue, 0, body.size || plan.dataSize || 0, 0, 0, true);
      const upload = sendUploadRequest(rarUploadUrl(plan.volumes[0].file,
          (queue && queue.basePath) || state.path, queue),
        body, null, body.size);
      setTimeout(() => {
        if (state.uploadBusy && state.uploadJobCancel) pollJob();
      }, 150);

      try {
        const result = await upload;
        const done = await waitJobIdle();
        if (done.error) throw new Error(done.error);
        return result;
      } catch (err) {
        const jobError = await jobErrorAfterUploadFailure(5000);
        if (jobError) throw new Error(jobError);
        throw err;
      }
    }

    async function uploadRar(files, queue) {
      if (!files || !files.length || state.uploadBusy) return;
      state.uploadBusy = true;
      state.uploadAbort = false;
      state.uploadJobCancel = false;
      state.uploadJobVerb = 'unrar';
      state.uploadXhrs.clear();
      setJobBox('unrar', 'Preparing RAR', 0);
      let finalStatus = 'success';
      let finalError = '';

      try {
        const plan = queue && queue.plan ? queue.plan : planRarUpload(files);
        let password = (queue && queue.password) || '';
        let askedPassword = false;
        let result = null;

        for (;;) {
          try {
            result = await uploadRarAttempt(plan, password, queue);
            break;
          } catch (err) {
            if (state.uploadAbort || isCancelledError(err.message)) throw err;
            if (!isRarPasswordError(err.message)) throw err;
            if (queue) throw new Error('password required');

            state.uploadJobCancel = false;
            state.uploadJobVerb = '';
            updateJobRole({ busy: false });
            const nextPassword = prompt(askedPassword ?
              'Wrong RAR password. Try again' :
              'RAR password may be required');
            if (nextPassword === null) {
              throw new Error('RAR password required');
            }
            password = nextPassword;
            askedPassword = true;
            state.uploadXhrs.clear();
          }
        }

        await refresh();
        toast('Extracted ' + Number(result.files || 0) + ' file(s)', 'ok');
      } catch (err) {
        finalStatus = state.uploadAbort || isCancelledError(err.message) ? 'cancelled' : 'failed';
        finalError = finalStatus === 'cancelled' ? 'upload cancelled' : err.message;
        if (queue) {
          await activityComplete(queue, finalStatus,
            finalError, 0, (queue && queue.totalBytes) || 0, 0, 1);
        }
        if (state.uploadAbort || isCancelledError(err.message)) {
          toast('RAR upload cancelled', 'err');
        } else {
          toast('rar: ' + err.message, 'err');
        }
        await refresh().catch(() => {});
      } finally {
        state.uploadBusy = false;
        state.uploadJobCancel = false;
        state.uploadJobVerb = '';
        state.uploadXhrs.clear();
        updateJobRole({ busy: false });
        setTimeout(() => {
          if (!state.uploadBusy && !state.jobTimer) el('job').classList.remove('show');
        }, 1600);
      }
      return { status: finalStatus, error: finalError };
    }

    async function runUploadFiles(files, queue) {
      if (!files || !files.length || state.uploadBusy) {
        return { status: 'failed', error: 'upload is busy' };
      }
      state.uploadBusy = true;
      state.uploadAbort = false;
      state.uploadJobCancel = false;
      state.uploadJobVerb = '';
      state.uploadXhrs.clear();
      state.activeActivityProgressAt = 0;
      let ok = 0;
      let failed = 0;
      let completedBytes = 0;
      let activeBytes = 0;
      let completedFiles = 0;
      let nextIndex = 0;
      let lastName = 'Preparing';
      let lastError = '';
      let lastProgressAt = 0;
      let progressTimer = 0;
      const totalBytes = files.reduce((sum, file) => sum + (file.size || 0), 0);
      const startedAt = Date.now();
      const basePath = (queue && queue.basePath) || state.path;
      const entries = files.map((file, index) => {
        const relPath = file.webkitRelativePath ?
          file.webkitRelativePath.split('/').slice(0, -1).join('/') : '';
        return { file, index, relPath, loaded: 0, key: relPath + '\0' + file.name };
      });
      const seenTargets = new Set();
      let duplicateTargets = false;
      for (const entry of entries) {
        if (seenTargets.has(entry.key)) duplicateTargets = true;
        seenTargets.add(entry.key);
      }
      const concurrency = duplicateTargets ? 1 : Math.min(UPLOAD_CONCURRENCY, entries.length);

      function flushProgress(force) {
        if (force && progressTimer) {
          clearTimeout(progressTimer);
          progressTimer = 0;
        }
        const now = Date.now();
        if (!force && now - lastProgressAt < UPLOAD_PROGRESS_INTERVAL) {
          if (!progressTimer) {
            progressTimer = setTimeout(() => {
              progressTimer = 0;
              flushProgress(true);
            }, UPLOAD_PROGRESS_INTERVAL - (now - lastProgressAt));
          }
          return;
        }
        lastProgressAt = now;
        updateUploadJob(completedBytes + activeBytes, totalBytes, startedAt,
          completedFiles, entries.length, lastName, failed, state.uploadAbort);
        activityProgress(queue, completedBytes + activeBytes, totalBytes,
          completedFiles, failed, force);
      }

      async function uploadWorker() {
        while(!state.uploadAbort) {
          const entry = entries[nextIndex++];
          if (!entry) break;
          lastName = entry.file.name;
          flushProgress(false);
          try {
            await uploadOne(entry.file, basePath, entry.relPath, (loaded) => {
              activeBytes += loaded - entry.loaded;
              entry.loaded = loaded;
              lastName = entry.file.name;
              flushProgress(false);
            }, entries.length === 1, queue);
            activeBytes -= entry.loaded;
            entry.loaded = 0;
            completedBytes += entry.file.size || 0;
            completedFiles++;
            ok++;
            lastName = entry.file.name;
            flushProgress(true);
            if (entries.length === 1 || ok === entries.length || ok % 10 === 0) {
              toast('Uploaded ' + ok + ' / ' + entries.length, 'ok');
            }
          } catch (err) {
            activeBytes -= entry.loaded;
            entry.loaded = 0;
            lastName = entry.file.name;
            if (state.uploadAbort || isCancelledError(err.message)) {
              state.uploadAbort = true;
              lastError = 'upload cancelled';
              flushProgress(true);
              break;
            }
            failed++;
            completedFiles++;
            lastError = err.message || 'upload failed';
            flushProgress(true);
            toast('upload: ' + err.message, 'err');
          }
        }
      }

      updateUploadJob(0, totalBytes, startedAt, 0, entries.length, 'Preparing', failed, false);
      await Promise.all(Array.from({ length: concurrency }, () => uploadWorker()));

      state.uploadBusy = false;
      state.uploadXhrs.clear();
      if (progressTimer) clearTimeout(progressTimer);
      const finalStatus = state.uploadAbort ? 'cancelled' : (failed ? 'failed' : 'success');
      if (queue) {
        await activityComplete(queue, finalStatus,
          finalStatus === 'success' ? '' : (lastError || 'upload failed'),
          completedBytes, totalBytes, ok, failed);
      }
      await refresh();
      if (state.uploadAbort) {
        toast('Upload cancelled after ' + ok + ' file(s)', 'err');
      } else {
        toast(ok + ' uploaded' + (failed ? ', ' + failed + ' failed' : ''), failed ? 'err' : 'ok');
      }
      setTimeout(() => {
        if (!state.uploadBusy && !state.jobTimer) el('job').classList.remove('show');
      }, 1600);
      return {
        status: finalStatus,
        error: finalStatus === 'success' ? '' : (lastError || 'upload failed'),
        copiedBytes: completedBytes,
        doneItems: ok,
        failedItems: failed
      };
    }

    function pollJob() {
      const box = el('job');
      const fill = el('job-fill');
      const text = el('job-text');
      const verb = el('job-verb');

      if (state.jobTimer) clearInterval(state.jobTimer);
      box.classList.add('show');
      text.textContent = 'Starting';
      let missed = 0;

      state.jobTimer = setInterval(async () => {
        try {
          const job = await api('/api/fs/job/status');
          missed = 0;
          const pct = job.totalBytes > 0 ?
            Math.max(0, Math.min(100, (job.copiedBytes / job.totalBytes) * 100)) : 0;
          fill.style.width = pct.toFixed(1) + '%';
          verb.textContent = job.verb || 'Working';
          text.textContent = jobProgressText(job);
          updateJobRole(job);
          if (state.activeQueueId && state.activeLeaseToken) {
            activityProgress({
              queueId: state.activeQueueId,
              leaseToken: state.activeLeaseToken
            }, Number(job.copiedBytes || 0), Number(job.totalBytes || 0),
              Number(job.doneFiles || 0), Number(job.failedFiles || 0), false);
          }

          if (!job.busy) {
            clearInterval(state.jobTimer);
            state.jobTimer = 0;
            if (job.error) toast(job.error, 'err');
            else scheduleLogsReveal();
            setTimeout(() => box.classList.remove('show'), 1400);
          }
        } catch (err) {
          missed++;
          text.textContent = 'Waiting for status...';
          if (missed >= 600) {
            clearInterval(state.jobTimer);
            state.jobTimer = 0;
            box.classList.remove('show');
            toast('Lost job status: ' + err.message, 'err');
          }
        }
      }, 500);
    }

    async function boot() {
      state.path = loadLastPath();
      el('path').value = state.path;
      decorateIconButtons();
      attachBulkMenu();
      pollControllerState();

      const placeRoot = el('places');
      const extra = [];

      document.querySelectorAll('[data-side-mode]').forEach((button) => {
        button.addEventListener('click', () => {
          if (button.dataset.sideMode === 'activity') refreshLogs({
            activate: true,
            preserveSelection: true
          });
          else setSideMode('paths');
        });
      });

      try {
        const usb = await api('/api/fs/usb');
        for (const mount of usb.mounts || []) {
          extra.push([mount.path.replace('/mnt/', '').toUpperCase(), mount.path]);
        }
      } catch (err) {}

      for (const [label, path] of places.concat(extra)) {
        const button = document.createElement('button');
        button.textContent = label;
        button.dataset.path = path;
        button.addEventListener('click', () => openPath(path));
        placeRoot.appendChild(button);
      }

      el('up').addEventListener('click', () => openPath(parentPath(state.path)));
      el('go').addEventListener('click', refresh);
      el('refresh').addEventListener('click', refresh);
      el('path').addEventListener('keydown', (event) => {
        if (event.key === 'Enter') refresh();
      });

      el('multi-select').addEventListener('click', () => {
        toggleMultiSelectLock();
      });
      el('copy').addEventListener('click', () => transfer('copy'));
      el('move').addEventListener('click', () => transfer('move'));
      el('target-current').addEventListener('click', () => {
        el('target-path').value = state.path;
      });
      el('open-target').addEventListener('click', () => {
        openPath(el('target-path').value);
      });
      document.querySelectorAll('[data-target]').forEach((button) => {
        button.addEventListener('click', () => {
          el('target-path').value = button.dataset.target;
        });
      });
      el('job-cancel').addEventListener('click', () => {
        if (state.uploadBusy) {
          state.uploadAbort = true;
          if (state.activeQueueId) {
            fetch('/api/fs/activity/cancel?queueId=' +
              encodeURIComponent(state.activeQueueId)).catch(() => {});
          }
          if (state.uploadJobCancel) {
            fetch('/api/fs/job/cancel').catch(() => {});
          }
          Array.from(state.uploadXhrs).forEach((xhr) => xhr.abort());
          setJobBox(state.uploadJobCancel ? (state.uploadJobVerb || 'unzip') : 'upload',
            'Cancelling upload...', 0);
          return;
        }
        fetch('/api/fs/job/cancel').catch(() => {});
      });

      el('upload-files').addEventListener('click', () => {
        el('file-picker').value = '';
        el('file-picker').click();
      });
      el('upload-folder').addEventListener('click', () => {
        if (!('webkitdirectory' in document.createElement('input'))) {
          toast('Folder picking is not available in this browser', 'err');
          return;
        }
        el('folder-picker').value = '';
        el('folder-picker').click();
      });
      el('upload-zip').addEventListener('click', () => {
        el('zip-picker').value = '';
        el('zip-picker').click();
      });
      el('upload-rar').addEventListener('click', () => {
        el('rar-picker').value = '';
        el('rar-picker').click();
      });
      el('file-picker').addEventListener('change', (event) => {
        enqueueUploadFiles(Array.from(event.target.files || []));
      });
      el('folder-picker').addEventListener('change', (event) => {
        enqueueUploadFiles(Array.from(event.target.files || []));
      });
      el('zip-picker').addEventListener('change', (event) => {
        enqueueZipUpload((event.target.files || [])[0]);
      });
      el('rar-picker').addEventListener('change', (event) => {
        enqueueRarUpload(Array.from(event.target.files || []));
      });
      document.addEventListener('click', (event) => {
        if (!insideClass(event.target, 'row-actions')) closeRowMenus();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeLogModal();
          closeRowMenus();
        }
      });
      document.addEventListener('visibilitychange', warnIfUploadBackgrounded);
      el('log-modal-close').addEventListener('click', closeLogModal);
      el('log-modal').addEventListener('click', (event) => {
        if (event.target === el('log-modal')) closeLogModal();
      });

      await refresh();
      drawLogs();
      startActivityPolling();
      refreshLogs({ activate: false, preserveSelection: true, quiet: true });

      api('/api/status').then((info) => {
        const status = el('status');
        status.classList.add('ready');
        status.querySelector('span:last-child').textContent = 'Ready';
        el('build').textContent = (info.tag || 'file-explorer') + ' / port 5905';
      }).catch(() => {
        el('status').querySelector('span:last-child').textContent = 'Offline';
      });

      api('/api/fs/job/status').then((job) => {
        if (job.busy) pollJob();
      }).catch(() => {});
    }

    boot();
  </script>
</body>
</html>
